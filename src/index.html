<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌍 异世界开拓者 · 序章</title>
<style>
:root{--bg:#1a1410;--panel:#2a1f18;--gold:#c8a45c;--text:#e8dcc8;--accent:#5a9e6f;--warn:#c44;--mystic:#9b6fb0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;height:100dvh;touch-action:manipulation;user-select:none;-webkit-user-select:none}
#app{display:flex;flex-direction:column;height:100dvh;max-width:900px;margin:0 auto}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--panel);border-bottom:1px solid #3a2a1a;font-size:13px;gap:8px;flex-shrink:0}
#topbar .chapter{color:var(--gold);font-weight:bold;white-space:nowrap}
#topbar .time{color:#aaa}
#topbar .resources{display:flex;gap:10px;font-size:12px}
#topbar .resources span{display:flex;align-items:center;gap:2px}
#gameview{flex:1;position:relative;overflow:hidden;min-height:0}
#gameview canvas{display:block;width:100%;height:100%}
#bottombar{display:flex;justify-content:space-around;padding:6px 0;background:var(--panel);border-top:1px solid #3a2a1a;flex-shrink:0}
#bottombar button{flex:1;padding:10px 4px;background:none;border:none;color:#999;font-size:13px;cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:2px}
#bottombar button .icon{font-size:20px}
#bottombar button.active{color:var(--gold);background:rgba(200,164,92,.1)}
#bottombar button:hover{color:#ccc}
#dialog_overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;z-index:100;justify-content:center;align-items:center;flex-direction:column;padding:20px}
#dialog_overlay.show{display:flex}
#dialog_box{background:var(--panel);border:2px solid var(--gold);border-radius:8px;padding:20px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto}
#dialog_box .portrait{width:64px;height:64px;margin:-40px auto 12px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:36px;background:#2a1f18}
#dialog_box .speaker{color:var(--gold);font-weight:bold;text-align:center;margin-bottom:4px}
#dialog_box .text{line-height:1.7;margin-bottom:16px;font-size:15px}
#dialog_box .choices{display:flex;flex-direction:column;gap:8px}
#dialog_box .choices button{width:100%;padding:12px;background:rgba(200,164,92,.1);border:1px solid var(--gold);color:var(--gold);border-radius:6px;font-size:14px;cursor:pointer;text-align:left;transition:.2s}
#dialog_box .choices button:hover{background:rgba(200,164,92,.25)}
#dialog_box .continue{text-align:center}
#dialog_box .continue button{padding:10px 30px;background:var(--gold);border:none;color:#1a1410;border-radius:6px;font-size:14px;cursor:pointer;font-weight:bold}
#announce{position:fixed;top:20%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:18px;text-align:center;text-shadow:2px 2px 0 #000;pointer-events:none;z-index:50;transition:opacity .5s;opacity:0;white-space:nowrap}
#announce.show{opacity:1}
@media(max-width:600px){#topbar{font-size:10px;padding:6px 8px}#topbar .resources{font-size:10px;gap:6px}#bottombar button{font-size:11px}#bottombar button .icon{font-size:16px}#dialog_box{padding:14px;max-width:95%}#dialog_box .text{font-size:13px}}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="chapter">📖 <span id="chapter_name">序幕 · 苏醒</span></span>
    <span class="time"><span id="time_icon">☀️</span> <span id="time_text">第1天 06:00</span></span>
    <span class="resources">
      <span>🪵<span id="r_wood">0</span></span>
      <span>🪨<span id="r_stone">0</span></span>
      <span>✨<span id="r_star">0</span></span>
      <span>🌿<span id="r_herb">0</span></span>
    </span>
  </div>
  <div id="gameview"><canvas id="gc"></canvas></div>
  <div id="bottombar">
    <button id="btn_home" class="active" onclick="GM.switchMode('home')"><span class="icon">🏠</span>家园</button>
    <button id="btn_expedition" onclick="GM.switchMode('expedition')"><span class="icon">🗺️</span>远征</button>
    <button id="btn_bestiary" onclick="GM.openBestiary()"><span class="icon">📖</span>图鉴</button>
    <button id="btn_journal" onclick="GM.openJournal()"><span class="icon">📜</span>日志</button>
  </div>
</div>
<div id="dialog_overlay"><div id="dialog_box"></div></div>
<div id="announce"></div>
<script>
// ==================== 异世界开拓者 · 引擎 v4 ====================
const TILE = 40;
let W, H; // canvas dimensions

const PAL = {
  bg:'#1a1410', panel:'#2a1f18', gold:'#c8a45c', text:'#e8dcc8',
  grass:['#3d5a3c','#45633e','#3a5535'], grass2:'#4a6e42',
  dirt:'#6b5340', path:'#8a7355', wood:'#8b6914', wood2:'#a07830',
  stone:'#707070', stone2:'#888', water:'#3a7090', water2:'#5a90b0',
  roof:'#b33a30', wall:'#c4956a', leaf:'#2d6a2f', leaf2:'#3a8c3f',
  skin:'#f0c8a0', skin2:'#e0b080', hair:'#4a2810',
  silver:'#c0c0d0', elfGreen:'#3a8c40',
  floatPurple:'#9b6fb0', floatLight:'#c8a0d8',
  walkPurple:'#6b3fa0', walkLight:'#a070d0',
  night:'rgba(10,8,30,', star:'#ffd700', pink:'#ff69b4',
  mystic:'#9b6fb0', danger:'#cc4444',
};

// ==================== GAME STATE ====================
const GS = {
  mode:'home', // home | expedition
  chapter:'prologue',
  day:1, timeOfDay:'morning', // morning|day|dusk|night
  resources:{wood:0,stone:0,starshard:0,herb:0,plank:0,ironOre:0,ironIngot:0},
  buildings:['hut'], // built building types
  buildingSlots:{c:null,w:null,s:null,f:null,g:null,sp:null}, // center,west,south,farm,garden,special
  npcs:[{id:'lily',talkedToday:false,affinity:0,flags:{}}],
  traits:[], // character traits
  discoveries:[],
  journal:[],
  expedition:{active:false,direction:null,currentNode:0,nodes:[],pathIndex:0,completed:[]},
  flags:{tutorialDone:false,firstExpedition:false,firstNight:false,dreamHad:false,firstChange:false},
  chapterFlags:{},
  animQueue:[], animTimer:0, particles:[],
};

// ==================== CHAPTER DATA ====================
const CHAPTERS = {
  prologue:{
    name:'序幕 · 苏醒',
    location:'未知荒野',
    intro:`你睁开眼睛。

天空是陌生的紫色。地面柔软得不像泥土。

你不记得自己是谁，不记得怎么来的。但你知道一件事——这不是地球。

远处，有什么东西在半空中缓缓漂浮。淡粉色的微光，像呼吸一样明灭。

一个声音从背后传来：

"你终于醒了！我还以为这次又是个空的呢——"`,
    expeditions:[{
      id:'east_wilds',
      name:'东部荒野',
      nodes:[
        {type:'event',event:'float_rock_discovery',label:'?'},
        {type:'event',event:'talking_berry',label:'?'},
        {type:'event',event:'walking_tree_first',label:'?'},
        {type:'return',event:null,label:'🏠'},
      ],
      rewards:{wood:4,stone:2,starshard:1,herb:3},
      storyRewards:['发现世界上有会漂浮的石头','听到了奇怪的对话（但没看到说话的人）','看到一棵树在走 它在躲避什么？'],
    }],
  },
  chapter1:{
    name:'第一章 · 林中之声', location:'漫步森林',
    intro:'',
    expeditions:[],
  },
};

// ==================== EVENT DATA ====================
const EVENTS = {
  float_rock_discovery:{
    title:'浮游岩群',
    scene:'float_rocks',
    text:`前方的草地突然变得稀疏，取而代之的是一片奇异的景象——

十几块大小不一的岩石悬浮在半人高的空中，缓缓上下起伏。它们的表面泛着淡淡的粉色光芒，像在呼吸。

最奇怪的是：你靠近时，它们似乎微微向你倾斜。像是在...看？`,
    choices:[
      {text:'冲过去收集一些',action:'collect_risky',result:`你冲进岩石群中，伸手去抓最近的一块。\n\n它意外地轻——几乎像泡沫一样。你一口气抱了三块小的，塞进背包。但有一块大石头在你触碰后突然坠地，发出沉闷的声响。\n\n+2 ✨星之碎片 +1 🪨石头`},
      {text:'绕路，别碰这些怪东西',action:'bypass',result:`你决定不碰这些来路不明的石头，从旁边绕了过去。\n\n但走出一段距离后回头——它们好像...跟着你移动了一点？\n\n也许是错觉。但你加快了脚步。`},
      {text:'停下来仔细观察',action:'observe',result:`你蹲下来仔细看了好一阵。\n\n这些石头的内部似乎有细小的脉络在发光，像血管。表面偶尔有细小的晶体在生长——又迅速融化。\n\n莉莉后来说："浮游石会记住触碰过它们的人。你在上面留了印记。"\n\n图鉴解锁 +无额外资源但获得关键信息`},
    ]
  },
  talking_berry:{
    title:'窃窃私语的浆果丛',
    scene:'berry_bush',
    text:`你发现了一丛果实异常饱满的野莓。正要伸手去摘——

"别碰！那是我的——"

你猛地转身。没有人。

"......开玩笑的。摘吧摘吧。"

声音来自浆果丛本身？不对——声音像是从你脑子里直接响起的。`,
    choices:[
      {text:'摘了就跑',action:'grab',result:`你一把薅下三把野莓，拔腿就跑。\n\n"呜哇——粗鲁！"\n\n+3 🌿野莓\n\n那个声音让你今天一整天都心神不宁。是谁在说话？为什么只有你能听到？`},
      {text:'"你是谁？出来！"',action:'confront',result:`你对着空气喊道。\n\n沉默。然后——\n\n"...你居然能听到我。有意思。你跟他们不一样。"\n\n"他们？谁是'他们'？"\n\n"那些不会听的人。"\n\n之后再也没有声音了。但这句话让你脊背发凉。\n\n🌿解锁特性萌芽：【耳语者】— 能听到某些生物的心灵回响`},
      {text:'小心地摘几颗留一半',action:'gentle',result:`你摘了几颗最熟的，留下了一半。\n\n"...谢谢。"声音变得温和了些。"很少有人这么做。你要是再往东走，小心那些会走的树。它们在躲什么东西。"\n\n+2 🌿野莓 +获得关于漫步树的警告`},
    ]
  },
  walking_tree_first:{
    title:'漫步的巨树',
    scene:'walking_tree',
    text:`你的视野里出现了一棵树。

不是它的大小惊人——而是它刚才不在那里。你发誓你三秒前看这个方向时，这里是一片空地。

树干底部有粗壮的根须在地面上缓慢蠕动。整棵树以肉眼可见的速度...向左边移动。

然后它停了下来。树干上，一块树皮裂开，露出了一个发光的空洞——像一只眼睛。

它在看着你。`,
    choices:[
      {text:'砍！（需要斧头——目前没有）',action:'attack',disabled:true,disabledText:'需要解锁工具台制作斧头',result:''},
      {text:'缓缓后退，不要对视',action:'retreat',result:`你慢慢后退，目光没有移开它。\n\n它"注视"了你几秒，树冠微微抖动——像是在点头。然后继续缓慢向左移动，消失在树林边缘。\n\n+1 🪵活木（它离开时掉落了一截树枝）\n\n"它在躲避什么"——浆果丛的话在你脑海中回响。`},
      {text:'站在原地，让它看',action:'stay',result:`你没有动。\n\n树"注视"了你整整十秒。然后做出了一件你完全没预料到的事——\n\n它的一根树枝垂下来，轻轻碰了碰你的肩膀。\n\n然后树根加速蠕动，整棵树快速离开了。你低头——肩膀上的衣服沾了一些发光的树液，凉凉的。\n\n+1 🪵活木  +🌿你的肩膀偶尔会微微发光（夜晚更明显）`},
    ]
  },
};

// ==================== DIALOG SYSTEM ====================
let dialogs = [];
function showDialog(speaker,portrait,text,choices){
  return new Promise(resolve=>{
    const ov=document.getElementById('dialog_overlay');
    const box=document.getElementById('dialog_box');
    let html=`<div class="portrait">${portrait}</div>`;
    html+=`<div class="speaker">${speaker}</div>`;
    html+=`<div class="text">${text.replace(/\n/g,'<br>')}</div>`;
    if(choices&&choices.length>0){
      html+=`<div class="choices">`;
      choices.forEach((c,i)=>{
        const d=c.disabled?' disabled':'';
        const t=c.disabled?`${c.text}<br><small style="color:#888">${c.disabledText||''}</small>`:c.text;
        html+=`<button${d} onclick="GM.resolveDialog(${i})">${t}</button>`;
      });
      html+=`</div>`;
    }else{
      html+=`<div class="continue"><button onclick="GM.resolveDialog(-1)">继续 ▸</button></div>`;
    }
    box.innerHTML=html;
    ov.classList.add('show');
    dialogs.push({resolve,choices});
    GS.animQueue.push('dialog');
  });
}
function announce(text,dur=2500){
  const el=document.getElementById('announce');
  el.textContent=text;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}

// ==================== GAME MANAGER ====================
const GM = {
  resolveDialog(idx){
    const d=dialogs.pop();
    document.getElementById('dialog_overlay').classList.remove('show');
    GS.animQueue=GS.animQueue.filter(a=>a!=='dialog');
    if(d)d.resolve(idx);
  },
  switchMode(m){
    GS.mode=m;
    document.getElementById('btn_home').classList.toggle('active',m==='home');
    document.getElementById('btn_expedition').classList.toggle('active',m==='expedition');
    R.draw();
  },
  openBestiary(){
    let html='<div style="padding:12px"><h3 style="color:var(--gold);margin-bottom:8px">📖 奇异图鉴</h3>';
    if(GS.discoveries.length===0){
      html+='<p style="color:#888">还没有发现任何奇异事物...<br>去远征吧！</p>';
    }else{
      GS.discoveries.forEach(d=>{
        html+=`<div style="background:rgba(200,164,92,.08);padding:8px;margin-bottom:6px;border-radius:4px;border-left:3px solid var(--gold)">${d}</div>`;
      });
    }
    html+=`<div class="continue"><button onclick="this.closest('#dialog_overlay').classList.remove('show')">关闭</button></div>`;
    document.getElementById('dialog_box').innerHTML=html;
    document.getElementById('dialog_overlay').classList.add('show');
  },
  openJournal(){
    let html='<div style="padding:12px"><h3 style="color:var(--gold);margin-bottom:8px">📜 冒险日志</h3>';
    if(GS.journal.length===0){
      html+='<p style="color:#888">还没有记录...<br>经历的事情会记录在这里。</p>';
    }else{
      GS.journal.forEach(j=>{
        html+=`<div style="background:rgba(200,164,92,.08);padding:8px;margin-bottom:6px;border-radius:4px;font-size:13px;line-height:1.6">📝 ${j}</div>`;
      });
    }
    html+=`<div class="continue"><button onclick="this.closest('#dialog_overlay').classList.remove('show')">关闭</button></div>`;
    document.getElementById('dialog_box').innerHTML=html;
    document.getElementById('dialog_overlay').classList.add('show');
  },
  addJournal(entry){if(!GS.journal.includes(entry))GS.journal.push(entry);},
  addDiscovery(entry){if(!GS.discoveries.includes(entry)){GS.discoveries.push(entry);announce('🔍 新发现！');}},
  addTrait(trait){if(!GS.traits.includes(trait)){GS.traits.push(trait);announce('🌿 获得新特性！');}},
  updateUI(){
    document.getElementById('r_wood').textContent=GS.resources.wood;
    document.getElementById('r_stone').textContent=GS.resources.stone;
    document.getElementById('r_star').textContent=GS.resources.starshard;
    document.getElementById('r_herb').textContent=GS.resources.herb;
    const tod={morning:'☀️',day:'☀️',dusk:'🌅',night:'🌙'};
    document.getElementById('time_icon').textContent=tod[GS.timeOfDay]||'☀️';
    document.getElementById('time_text').textContent=`第${GS.day}天`;
    document.getElementById('chapter_name').textContent=CHAPTERS[GS.chapter]?.name||'???';
  },
  addResources(r){for(const[k,v]of Object.entries(r)){GS.resources[k]=(GS.resources[k]||0)+v;}},
  async startExpedition(directionId){
    const exp=CHAPTERS[GS.chapter]?.expeditions?.find(e=>e.id===directionId);
    if(!exp)return;
    GS.expedition={active:true,direction:directionId,currentNode:0,nodes:exp.nodes,pathIndex:0,completed:[]};
    GS.mode='expedition';
    document.getElementById('btn_home').classList.remove('active');
    document.getElementById('btn_expedition').classList.add('active');
    R.draw();
    await GM.delay(800);
    await GM.advanceExpedition();
  },
  async advanceExpedition(){
    const exp=GS.expedition;
    if(!exp.active)return;
    const node=exp.nodes[exp.currentNode];
    if(!node)return;
    if(node.type==='return'){
      await GM.finishExpedition();
      return;
    }
    // Animate to node
    exp.currentNode++;
    R.draw();
    await GM.delay(600);
    if(node.type==='event'&&node.event){
      await GM.triggerEvent(node.event);
    }
    if(exp.currentNode>=exp.nodes.length||exp.nodes[exp.currentNode]?.type==='return'){
      await GM.delay(300);
      await GM.finishExpedition();
    }
  },
  async triggerEvent(eventId){
    const ev=EVENTS[eventId];
    if(!ev)return;
    const idx=await showDialog(ev.title,'❓',ev.text,ev.choices);
    if(idx>=0&&ev.choices[idx]){
      const c=ev.choices[idx];
      await showDialog('',c.action==='collect_risky'?'⚡':c.action==='bypass'?'🚶':c.action==='observe'?'🔍':c.action==='grab'?'🏃':c.action==='confront'?'💬':c.action==='gentle'?'🤝':c.action==='retreat'?'🚶':'🧍','',[{text:c.result}]);
      // Apply results
      if(c.action==='collect_risky'){GM.addResources({starshard:2,stone:1});GM.addDiscovery('浮游岩群 — 会呼吸的石头，似乎有记忆');}
      if(c.action==='observe'){GM.addDiscovery('浮游岩群 — 内部有发光脉络，会记住触碰者');}
      if(c.action==='grab'){GM.addResources({herb:3});}
      if(c.action==='confront'){GM.addResources({herb:1});GM.addTrait('耳语者');GM.addJournal('有一个无形的声音在浆果丛里说话——只有我能听到。它提到了"那些不会听的人"。');}
      if(c.action==='gentle'){GM.addResources({herb:2});GM.addJournal('浆果丛的声音警告我：漫步树在躲避什么东西。');}
      if(c.action==='retreat'){GM.addResources({wood:1});GM.addDiscovery('漫步树 — 会移动的巨树，有眼睛一样的空洞。它在躲避什么？');}
      if(c.action==='stay'){GM.addResources({wood:1});GM.addDiscovery('漫步树 — 触碰了我的肩膀后离开。树液在皮肤上发凉。');GM.addJournal('一棵漫步树用树枝碰了我的肩膀。它不像害怕——更像是确认了某件事。');}
    }
  },
  async finishExpedition(){
    const exp=GS.expedition;
    const expData=CHAPTERS[GS.chapter]?.expeditions?.find(e=>e.id===exp.direction);
    if(expData?.rewards)GM.addResources(expData.rewards);
    if(expData?.storyRewards)expData.storyRewards.forEach(s=>GM.addJournal(s));
    GS.expedition={active:false,direction:null,currentNode:0,nodes:[],pathIndex:0,completed:GS.expedition.completed};
    GS.flags.firstExpedition=true;
    GS.timeOfDay='dusk';
    GM.mode='home';
    document.getElementById('btn_home').classList.add('active');
    document.getElementById('btn_expedition').classList.remove('active');
    R.draw();
    announce('🏠 远征归来！');
    await GM.delay(1500);
    // Trigger post-expedition events
    if(!GS.flags.firstNight)await GM.triggerNightfall();
  },
  async triggerNightfall(){
    GS.flags.firstNight=true;
    GS.timeOfDay='night';
    GS.buildings.push('garden_bed'); // 月露草床自动出现
    GM.updateUI();R.draw();
    await showDialog('夜幕降临','🌙',`天黑了下来。

但领地的角落有什么东西在发光——

一丛你从未见过的植物从泥土中钻了出来。纤细的茎，顶端是半透明的花苞，散发着柔和的蓝色荧光。

莉莉站在你旁边，声音很轻：

"月露草。只有月光下才开。这里...以前没有这东西。"

你低头看自己的手——指尖也在发出微弱的蓝光。\n\n和那些草一样的颜色。`);
    if(!GS.flags.dreamHad)await GM.triggerDream();
  },
  async triggerDream(){
    GS.flags.dreamHad=true;
    GM.updateUI();R.draw();
    announce('💤 你沉沉睡去...');
    await GM.delay(1500);
    await showDialog('???','👁️',`梦境。

黑暗中有声音。不像说话——更像是某种韵律。像心跳，又像呼吸。

然后你看到了文字。不是用眼睛看到——是直接出现在意识里：

"第47个。欢迎。"

"你不是来寻找答案的。你是答案。"

"边缘在崩塌。快点。"

你猛地惊醒。天已经亮了。\n\n但手心里写着两个字——在你醒来前你就写下的：\n\n"抬头看。"`);
    GS.flags.firstChange=true;
    GS.addTrait('蓝荧之触 — 指尖和月露草同步发光');
    GS.addJournal('梦里有个声音说我是"第47个"。说"边缘在崩塌"。然后我的手自己写了"抬头看"。');
    GS.day=2;GS.timeOfDay='morning';
    GM.updateUI();R.draw();
    await showDialog('莉莉','🧝‍♀️',`第二天早晨。

莉莉看到你的手时，表情很复杂：

"你的手...在发光？和月露草一样？"

她咬了咬嘴唇。

"前任领主也发生过类似的事。他在日记里写——'我的影子开始不按我的动作移动。'然后没多久他就..."

她没说完。但你知道她想说什么。`);
  },
  delay(ms){return new Promise(r=>setTimeout(r,ms));},
};

// ==================== RENDERER ====================
const R = {
  draw(){
    const c=document.getElementById('gc');
    const p=c.parentElement;
    c.width=p.clientWidth*2;c.height=p.clientHeight*2;
    W=c.width;H=c.height;
    const ctx=c.getContext('2d');
    ctx.scale(2,2);
    const w=W/2,h=H/2;
    ctx.imageSmoothingEnabled=false;

    if(GS.mode==='home')R.drawHome(ctx,w,h);
    else R.drawExpedition(ctx,w,h);

    R.drawParticles(ctx);
  },
  drawHome(ctx,w,h){
    // Sky gradient
    const todColors={
      morning:['#6a8fa0','#8ab0c0'],
      day:['#5a8ab0','#8ab8d0'],
      dusk:['#c07050','#d09070'],
      night:['#0a0a20','#1a1a40']
    };
    const sky=todColors[GS.timeOfDay]||todColors.day;
    const skyGrad=ctx.createLinearGradient(0,0,0,h);
    skyGrad.addColorStop(0,sky[0]);skyGrad.addColorStop(1,sky[1]);
    ctx.fillStyle=skyGrad;ctx.fillRect(0,0,w,h);

    // Ground
    const gy=h*0.35;
    ctx.fillStyle=PAL.grass[0];ctx.fillRect(0,gy,w,h-gy);
    // Grass texture
    for(let x=0;x<w;x+=12){
      ctx.fillStyle=PAL.grass[(Math.floor(x/12)%3)];
      ctx.fillRect(x,gy,12,h-gy);
    }

    // Territory floor
    const cx=w/2,cy=h*0.6;
    const gridSize=Math.min(w*0.15,64);
    const gs=gridSize;
    // 2x3 grid
    for(let row=0;row<2;row++){
      for(let col=0;col<3;col++){
        const gx=cx+(col-1.5)*gs*1.2, gy2=cy+(row-0.5)*gs*1.2;
        ctx.fillStyle='rgba(0,0,0,.15)';ctx.fillRect(gx,gy2,gs,gs);
        ctx.strokeStyle='rgba(200,164,92,.2)';ctx.lineWidth=1;
        ctx.strokeRect(gx,gy2,gs,gs);
      }
    }

    // Buildings on grid
    const slots=[
      {id:'hut',col:0,row:0},{id:'craft',col:1,row:0},{id:'garden',col:2,row:0},
      {id:'storage',col:0,row:1},{id:'furnace',col:1,row:1},{id:'special',col:2,row:1},
    ];
    slots.forEach(s=>{
      const gx=cx+(s.col-1.5)*gs*1.2, gy2=cy+(s.row-0.5)*gs*1.2;
      const built=GS.buildings.includes(s.id)||(s.id==='hut');
      if(s.id==='hut')R.drawHut(ctx,gx,gy2,gs);
      else if(built){
        ctx.fillStyle='#3a3020';ctx.fillRect(gx+4,gy2+4,gs-8,gs-8);
        ctx.strokeStyle=PAL.gold;ctx.lineWidth=1;ctx.strokeRect(gx+4,gy2+4,gs-8,gs-8);
        const icons={craft:'🔨',garden:'🌱',storage:'📦',furnace:'🔥',special:'🔮'};
        ctx.font=`${gs*0.4}px sans-serif`;ctx.textAlign='center';
        ctx.fillText(icons[s.id]||'❓',gx+gs/2,gy2+gs/2+gs*0.15);
      }else{
        ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(gx,gy2,gs,gs);
        ctx.strokeStyle='rgba(200,164,92,.15)';ctx.setLineDash([4,4]);
        ctx.strokeRect(gx,gy2,gs,gs);ctx.setLineDash([]);
        ctx.fillStyle='rgba(200,164,92,.3)';ctx.font=`${gs*0.25}px sans-serif`;ctx.textAlign='center';
        ctx.fillText('???',gx+gs/2,gy2+gs/2);
      }
    });

    // Lily NPC
    const lilyX=cx-gs*1.8, lilyY=cy+gs*0.15;
    R.drawLily(ctx,lilyX,lilyY,gs*0.8);

    // Player
    const px=cx-gs*2.2, py=cy+gs*0.1;
    R.drawPlayer(ctx,px,py,gs*0.75);

    // Moonlight grass effect at night
    if(GS.timeOfDay==='night'&&GS.flags.firstNight){
      const glowX=cx+gs*1.2, glowY=cy+gs*0.3;
      ctx.fillStyle='rgba(100,150,255,0.15)';ctx.beginPath();
      ctx.arc(glowX,glowY,gs*0.6,0,Math.PI*2);ctx.fill();
      // Tiny glowing flowers
      for(let i=0;i<5;i++){
        const fx=glowX-gs*0.3+i*gs*0.15, fy=glowY+Math.sin(Date.now()/1500+i)*3;
        ctx.fillStyle='rgba(150,180,255,0.8)';ctx.beginPath();
        ctx.arc(fx,fy,3,0,Math.PI*2);ctx.fill();
      }
    }
  },
  drawHut(ctx,x,y,s){
    // Walls
    ctx.fillStyle=PAL.wall;ctx.fillRect(x+s*0.15,y+s*0.3,s*0.7,s*0.7);
    ctx.strokeStyle='#6B5335';ctx.lineWidth=1;ctx.strokeRect(x+s*0.15,y+s*0.3,s*0.7,s*0.7);
    // Roof
    ctx.fillStyle=PAL.roof;
    ctx.beginPath();ctx.moveTo(x+s*0.05,y+s*0.3);ctx.lineTo(x+s*0.5,y+s*0.05);ctx.lineTo(x+s*0.95,y+s*0.3);
    ctx.closePath();ctx.fill();
    // Door
    ctx.fillStyle='#4a2810';ctx.fillRect(x+s*0.38,y+s*0.6,s*0.24,s*0.4);
    // Window glow
    if(GS.timeOfDay==='night'){ctx.fillStyle='rgba(255,200,100,0.5)';ctx.fillRect(x+s*0.22,y+s*0.4,s*0.15,s*0.15);}
    else{ctx.fillStyle='#aaddff';ctx.fillRect(x+s*0.22,y+s*0.4,s*0.15,s*0.15);}
    // Sign
    ctx.fillStyle='#a08060';ctx.fillRect(x+s*0.3,y+s*0.05,s*0.4,s*0.12);
    ctx.fillStyle='#fff';ctx.font=`${s*0.1}px sans-serif`;ctx.textAlign='center';
    ctx.fillText('🏠 家',x+s*0.5,y+s*0.15);
  },
  drawLily(ctx,x,y,s){
    // Shadow
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(x+s/2,y+s-2,s*0.4,4,0,0,Math.PI*2);ctx.fill();
    // Body - green robe
    ctx.fillStyle=PAL.elfGreen;ctx.fillRect(x+s*0.2,y+s*0.35,s*0.6,s*0.65);
    // Head
    ctx.fillStyle=PAL.skin;ctx.fillRect(x+s*0.25,y+s*0.1,s*0.5,s*0.3);
    // Hair
    ctx.fillStyle=PAL.silver;ctx.fillRect(x+s*0.15,y+s*0.02,s*0.7,s*0.18);
    ctx.fillRect(x+s*0.05,y+s*0.08,s*0.12,s*0.2);ctx.fillRect(x+s*0.83,y+s*0.08,s*0.12,s*0.2);
    // Eyes
    ctx.fillStyle='#2a5a2a';ctx.fillRect(x+s*0.32,y+s*0.18,s*0.08,s*0.06);
    ctx.fillRect(x+s*0.55,y+s*0.18,s*0.08,s*0.06);
    // Ears
    ctx.fillStyle=PAL.skin;ctx.fillRect(x+s*0.05,y+s*0.1,s*0.12,s*0.18);
    ctx.fillRect(x+s*0.83,y+s*0.1,s*0.12,s*0.18);
    // Smile
    ctx.strokeStyle='#6a4a3a';ctx.lineWidth=1;ctx.beginPath();
    ctx.arc(x+s*0.48,y+s*0.26,s*0.06,0,Math.PI);ctx.stroke();
    // Feet
    ctx.fillStyle='#5a3020';ctx.fillRect(x+s*0.22,y+s*0.95,s*0.22,s*0.08);
    ctx.fillRect(x+s*0.52,y+s*0.95,s*0.22,s*0.08);
  },
  drawPlayer(ctx,x,y,s){
    // Shadow
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(x+s/2,y+s-2,s*0.4,4,0,0,Math.PI*2);ctx.fill();
    // Legs
    ctx.fillStyle='#5a4020';ctx.fillRect(x+s*0.3,y+s*0.7,s*0.18,s*0.3);
    ctx.fillRect(x+s*0.52,y+s*0.7,s*0.18,s*0.3);
    // Body - blue tunic
    ctx.fillStyle='#4488cc';ctx.fillRect(x+s*0.2,y+s*0.35,s*0.6,s*0.4);
    // Arms
    ctx.fillStyle=PAL.skin;ctx.fillRect(x+s*0.1,y+s*0.35,s*0.12,s*0.45);
    ctx.fillRect(x+s*0.78,y+s*0.35,s*0.12,s*0.45);
    // Head
    ctx.fillStyle=PAL.skin;ctx.fillRect(x+s*0.22,y+s*0.08,s*0.56,s*0.3);
    // Hair
    ctx.fillStyle=PAL.hair;ctx.fillRect(x+s*0.15,y+s*0.04,s*0.7,s*0.15);
    // Eyes
    ctx.fillStyle='#000';ctx.fillRect(x+s*0.35,y+s*0.18,s*0.08,s*0.06);
    ctx.fillRect(x+s*0.55,y+s*0.18,s*0.08,s*0.06);
    // Glow effect for traits
    if(GS.traits.includes('蓝荧之触 — 指尖和月露草同步发光')){
      ctx.fillStyle='rgba(100,150,255,0.6)';
      ctx.fillRect(x+s*0.05,y+s*0.72,s*0.1,s*0.08);
      ctx.fillRect(x+s*0.85,y+s*0.72,s*0.1,s*0.08);
    }
    // Shoes
    ctx.fillStyle='#3a2810';ctx.fillRect(x+s*0.28,y+s*0.95,s*0.2,s*0.08);
    ctx.fillRect(x+s*0.5,y+s*0.95,s*0.2,s*0.08);
  },
  drawExpedition(ctx,w,h){
    // Sky
    const skyGrad=ctx.createLinearGradient(0,0,0,h);
    skyGrad.addColorStop(0,'#3a5060');skyGrad.addColorStop(1,'#5a7060');
    ctx.fillStyle=skyGrad;ctx.fillRect(0,0,w,h);

    // Title
    ctx.fillStyle=PAL.gold;ctx.font='bold 16px sans-serif';ctx.textAlign='center';
    const exp=CHAPTERS[GS.chapter]?.expeditions?.find(e=>e.id===GS.expedition.direction);
    ctx.fillText(exp?.name||'远征',w/2,30);

    // Node map
    const nodes=GS.expedition.nodes||[];
    const startX=w*0.1, endX=w*0.9, nodeY=h*0.45;
    const spacing=(endX-startX)/Math.max(nodes.length-1,1);

    // Path
    ctx.strokeStyle='rgba(200,164,92,.3)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(startX,nodeY);
    for(let i=1;i<nodes.length;i++)ctx.lineTo(startX+spacing*i,nodeY);
    ctx.stroke();

    // Nodes
    nodes.forEach((n,i)=>{
      const nx=startX+spacing*i;
      const passed=i<GS.expedition.currentNode;
      const current=i===GS.expedition.currentNode;

      // Dot
      if(passed)ctx.fillStyle='rgba(200,164,92,.5)';
      else if(current)ctx.fillStyle=PAL.gold;
      else ctx.fillStyle='rgba(200,164,92,.2)';
      ctx.beginPath();ctx.arc(nx,nodeY,current?14:10,0,Math.PI*2);ctx.fill();
      if(current){
        ctx.strokeStyle=PAL.gold;ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(nx,nodeY,16,0,Math.PI*2);ctx.stroke();
        // Pulse
        const pulse=Math.sin(Date.now()/500)*3;
        ctx.strokeStyle='rgba(200,164,92,.4)';ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(nx,nodeY,18+pulse,0,Math.PI*2);ctx.stroke();
      }

      // Label
      ctx.fillStyle=passed?'rgba(200,164,92,.7)':'rgba(200,164,92,.3)';
      ctx.font='12px sans-serif';ctx.textAlign='center';
      ctx.fillText(n.label||'?',nx,nodeY-20);
      if(n.type==='return')ctx.fillText('🏠',nx,nodeY-20);
    });

    // Current position indicator
    if(GS.expedition.currentNode>0&&GS.expedition.currentNode<nodes.length){
      const cx2=startX+spacing*(GS.expedition.currentNode-0.5);
      ctx.fillStyle=PAL.gold;ctx.font='bold 14px sans-serif';ctx.textAlign='center';
      ctx.fillText('📍',cx2,nodeY-40);
    }

    // Bottom hint
    ctx.fillStyle='#aaa';ctx.font='13px sans-serif';ctx.textAlign='center';
    if(!GS.expedition.active)ctx.fillText('选择一个方向开始远征',w/2,h-60);
    else if(GS.expedition.currentNode>=nodes.length||nodes[GS.expedition.currentNode]?.type==='return')
      ctx.fillText('点击继续返回领地',w/2,h-60);
    else ctx.fillText('点击地图继续前进',w/2,h-60);
  },
  drawParticles(ctx){
    // Particle system for future use
  },
};

// ==================== INIT ====================
async function init(){
  GM.updateUI();
  R.draw();

  // Opening sequence
  await GM.delay(600);
  await showDialog('???','💫',`你睁开眼睛。

陌生的天空。陌生的大地。

你想不起自己的名字。想不起怎么来到这里的。但你还记得一件事——

你不属于这里。`);

  await showDialog('莉莉','🧝‍♀️',`"你终于醒了！"

一个银发的精灵少女蹲在你面前，绿色的眼睛里满是惊喜。

"我还以为这次又是个空的——你知道，就是那种...只有身体，没有灵魂的那种？之前有好几次..."

她似乎意识到自己说得太多了，脸微微发红。

"我叫莉莉！在这里住了三年了。你是第一个..活着醒过来的。你叫什么名字？"`);

  await showDialog('我','🤔',`名字...你低头看了看自己。不认识的脸，不认识的衣服。

"我...不记得了。"

莉莉的笑容凝固了一秒，然后又灿烂起来。

"没关系！名字可以慢慢想。重要的是——你在这里了！"

她指向远处：

"看到那些浮在半空的石头了吗？这里是边缘之地——所有世界裂缝里掉下来的东西，最后都会飘到这里。包括你，包括我。"`);

  await showDialog('莉莉','🧝‍♀️',`"来，我先带你看看你的领地——上一个领主留下的。虽然破破烂烂的，但修一修还能用。"

她带你走向小屋。

"这位前任...是个很聪明的人类。他一直在研究这个世界的真相。但后来..."她的声音低了，"他的笔记越写越乱。最后一页只有一行字：'它知道我在看它。'"

然后什么都没了。他本人也消失了。`);

  await showDialog('莉莉','🧝‍♀️',`"但你别怕！我不会让你步他后尘的。我们先从小的开始——你去东边探探路，收集点材料回来。我在这里等你。"

她递给你一个简陋的背包。

"注意安全。如果看到什么不对劲的东西...这个世界大部分东西都不对劲。所以看到特别不对劲的，就跑！"

🏠 现在是你的回合了。先去东边远征吧！`);

  GM.addJournal('我叫不出自己的名字。莉莉说我是"第几个醒来的"——第几个？前面还有谁？前任领主在研究真相时消失了，最后一页写着"它知道我在看它"。');
  GM.updateUI();R.draw();
}

// ==================== CANVAS CLICK HANDLER ====================
document.getElementById('gc').addEventListener('click',async e=>{
  if(GS.animQueue.length>0)return;
  if(GS.mode==='expedition'&&GS.expedition.active){
    await GM.advanceExpedition();
  }else if(GS.mode==='expedition'&&!GS.expedition.active){
    // Start expedition
    await GM.startExpedition('east_wilds');
  }
});

// ==================== SAVE/LOAD ====================
function saveGame(){
  localStorage.setItem('isekai_v4_save',JSON.stringify({
    chapter:GS.chapter,day:GS.day,timeOfDay:GS.timeOfDay,
    resources:GS.resources,buildings:GS.buildings,
    traits:GS.traits,discoveries:GS.discoveries,journal:GS.journal,
    flags:GS.flags,npcs:GS.npcs.map(n=>({id:n.id,talkedToday:n.talkedToday,affinity:n.affinity,flags:n.flags})),
  }));
}
function loadGame(){
  const raw=localStorage.getItem('isekai_v4_save');
  if(!raw)return false;
  try{
    const d=JSON.parse(raw);
    Object.assign(GS,{...GS,...d,animQueue:[],animTimer:0,particles:[],mode:'home',expedition:{active:false,direction:null,currentNode:0,nodes:[],pathIndex:0,completed:d.expedition?.completed||[]}});
    return true;
  }catch(e){return false;}
}
setInterval(saveGame,15000);

// ==================== BOOT ====================
window.addEventListener('resize',()=>R.draw());
if(loadGame()){
  GM.updateUI();R.draw();
  announce('📂 存档已加载');
  // If player hasn't done first expedition, prompt
  if(!GS.flags.firstExpedition){
    setTimeout(async()=>{
      await showDialog('莉莉','🧝‍♀️',`"准备好去东边看看了吗？点击底部[🗺️远征]按钮出发！"`);
      GM.updateUI();R.draw();
    },500);
  }
}else{
  init();
}
</script>
