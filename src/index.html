<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌍 异世界开拓者</title>
<style>
/* ═══════════════════════════════════════════
   Isekai Pioneer v3 - Refined Pixel Art UI
   Earth tones, soft glow, elegant panels
   ═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#16120e;overflow:hidden;font-family:'Segoe UI','Courier New',monospace;touch-action:none;user-select:none}
canvas{display:block;image-rendering:pixelated}

/* ── Hotbar ── */
#ui{position:fixed;bottom:0;left:0;right:0;pointer-events:none;z-index:10}
#hotbar{display:flex;justify-content:center;gap:5px;padding:10px 8px;background:linear-gradient(180deg,rgba(20,14,10,0.92) 0%,rgba(14,10,6,0.96) 100%);border-top:2px solid #4a3a2a;box-shadow:0 -4px 16px rgba(0,0,0,0.5)}
.slot{width:50px;height:50px;background:linear-gradient(135deg,#2a2018 0%,#1e1610 100%);border:2px solid #4a3a2a;position:relative;border-radius:6px;cursor:pointer;pointer-events:auto;transition:all 0.15s}
.slot:hover{border-color:#8a7a5a;box-shadow:0 0 6px rgba(200,160,60,0.2)}
.slot .item{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.slot .item canvas{width:32px;height:32px;image-rendering:pixelated}
.slot .count{position:absolute;bottom:1px;right:5px;font-size:10px;color:#e8c860;text-shadow:0 1px 2px #000;font-weight:bold;letter-spacing:-0.5px}
.slot.selected{border-color:#c8a040;box-shadow:0 0 12px rgba(200,160,40,0.4),inset 0 0 8px rgba(200,160,40,0.1)}
/* Rarity glows */
.slot.rarity-uncommon{border-color:#6a8a5a}
.slot.rarity-rare{border-color:#5a5a9a;box-shadow:0 0 8px rgba(80,80,200,0.2)}
.slot.rarity-epic{border-color:#9a5a9a;box-shadow:0 0 10px rgba(180,80,180,0.25)}

/* ── Messages ── */
#msg{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:17px;text-align:center;text-shadow:0 2px 4px rgba(0,0,0,0.8);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:20;font-weight:500}

/* ── Info bar ── */
#info{position:fixed;top:10px;left:12px;color:#c8b898;font-size:11px;text-shadow:0 1px 3px rgba(0,0,0,0.7);pointer-events:none;line-height:1.6;z-index:5;background:rgba(14,10,6,0.7);padding:6px 10px;border-radius:6px;border:1px solid rgba(90,74,58,0.4)}
#info span{display:block}

/* ── Controls ── */
#controls{position:fixed;bottom:85px;right:12px;display:flex;flex-direction:column;gap:5px;pointer-events:auto;z-index:5}
#controls button{width:42px;height:42px;background:rgba(10,8,4,0.7);border:2px solid #4a3a2a;color:#c8a040;font-size:17px;border-radius:8px;cursor:pointer;transition:all 0.15s}
#controls button:hover{background:rgba(30,20,10,0.8);border-color:#8a7a5a;box-shadow:0 0 6px rgba(200,160,40,0.2)}
#controls button:active{background:rgba(50,30,15,0.9);transform:scale(0.95)}
.mobile-ctrl{position:fixed;bottom:85px;left:12px;display:none;pointer-events:auto;z-index:5}
.mobile-ctrl .row{display:flex;gap:3px;margin-bottom:3px}
.mobile-ctrl button{width:50px;height:50px;background:rgba(10,8,4,0.55);border:2px solid #4a3a2a;color:#d4c8b8;font-size:20px;border-radius:10px;cursor:pointer;user-select:none}
.mobile-ctrl .spacer{width:50px;height:50px;visibility:hidden}
@media(max-width:768px){.mobile-ctrl{display:block}}

/* ═══════ Panel Overlay ═══════ */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:50;display:none;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
#overlay.show{display:flex}

/* Panel frame with decorative border */
.panel{background:linear-gradient(135deg,rgba(22,16,10,0.97) 0%,rgba(16,10,6,0.98) 100%);
  border:3px solid #4a3a2a;border-radius:10px;
  width:90vw;max-width:720px;max-height:82vh;overflow-y:auto;
  padding:20px 16px;color:#d4c8b8;position:relative;
  box-shadow:0 8px 32px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.03)}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#8a7a5a 20%,#c8a040 50%,#8a7a5a 80%,transparent);border-radius:10px 10px 0 0}
.panel h2{color:#e8c860;text-align:center;margin-bottom:14px;font-size:19px;
  border-bottom:1px solid rgba(90,74,58,0.5);padding-bottom:10px;letter-spacing:1px}
.panel .close-btn{position:absolute;top:10px;right:14px;color:#c88880;font-size:20px;
  cursor:pointer;background:none;border:none;padding:4px 8px;transition:color 0.2s}
.panel .close-btn:hover{color:#e86050}

/* Tabs */
.panel-tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.panel-tabs button{flex:1;min-width:72px;padding:7px 6px;
  background:linear-gradient(180deg,rgba(40,30,20,0.8) 0%,rgba(30,20,14,0.9) 100%);
  border:1px solid #3a2a1a;color:#8a7a6a;cursor:pointer;font-size:12px;
  border-radius:5px;font-family:inherit;transition:all 0.2s}
.panel-tabs button:hover{border-color:#5a4a3a;color:#b8a888}
.panel-tabs button.active{background:linear-gradient(180deg,rgba(60,44,28,0.9) 0%,rgba(40,28,18,0.95) 100%);
  color:#e8c860;border-color:#8a7a5a;box-shadow:0 0 8px rgba(200,160,40,0.15)}

/* Cards - universal */
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px}
.recipe-card{background:linear-gradient(135deg,rgba(30,22,14,0.9) 0%,rgba(22,16,10,0.95) 100%);
  border:1px solid #3a2a1a;border-radius:6px;padding:10px 8px;text-align:center;
  transition:all 0.2s}
.recipe-card:hover{border-color:#5a4a3a;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.recipe-card .name{color:#e8c860;font-size:13px;margin-bottom:4px;font-weight:500}
.recipe-card .req{color:#8a7a6a;font-size:10px;line-height:1.4}
.recipe-card .arrow{color:#c8a040;margin:4px 0}
.recipe-card button{background:linear-gradient(180deg,rgba(60,44,28,0.8) 0%,rgba(40,28,16,0.9) 100%);
  color:#e8c860;border:1px solid #5a4a3a;padding:5px 14px;cursor:pointer;
  font-size:11px;border-radius:4px;margin-top:5px;font-family:inherit;transition:all 0.15s}
.recipe-card button:hover{background:rgba(80,60,34,0.85);border-color:#8a7a5a}
.recipe-card button:disabled{background:rgba(20,14,8,0.6);color:#555;border-color:#2a1a0a;cursor:default}

/* Bestiary - with illustration support */
.bestiary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.bestiary-card{background:linear-gradient(180deg,rgba(26,20,14,0.9) 0%,rgba(18,12,8,0.95) 100%);
  border:1px solid #3a2a1a;border-radius:6px;padding:12px;text-align:center;
  transition:all 0.25s}
.bestiary-card:hover{border-color:#5a4a3a}
.bestiary-card .illu{width:68px;height:68px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.3);border-radius:4px;border:1px solid #2a1a0a}
.bestiary-card .illu canvas{width:64px;height:64px;image-rendering:pixelated}
.bestiary-card .ename{color:#e8c860;font-size:13px;margin-bottom:3px;font-weight:500}
.bestiary-card .flavor{color:#7a6a5a;font-size:10px;line-height:1.5;font-style:italic;margin-top:4px}
.bestiary-card.locked{opacity:0.45}
.bestiary-card.locked .illu{position:relative}
.bestiary-card.locked .illu::after{content:'?';position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:28px;color:#4a3a2a}
.bestiary-card.locked .ename{color:#555}
.bestiary-card .rarity-tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;margin-top:3px}

/* Building */
.build-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.build-card{background:linear-gradient(135deg,rgba(30,22,14,0.9) 0%,rgba(22,16,10,0.95) 100%);
  border:1px solid #3a2a1a;border-radius:6px;padding:10px 8px;text-align:center;
  transition:all 0.2s}
.build-card:hover{border-color:#5a4a3a}
.build-card .name{color:#e8c860;font-size:13px;margin-bottom:4px;font-weight:500}
.build-card .desc{color:#8a7a6a;font-size:10px;line-height:1.4}
.build-card .cost{color:#88aa88;font-size:10px}
.build-card .thumb{width:48px;height:48px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.25);border-radius:4px}
.build-card .thumb canvas{width:40px;height:40px;image-rendering:pixelated}
.build-card button{background:linear-gradient(180deg,rgba(60,44,28,0.8) 0%,rgba(40,28,16,0.9) 100%);
  color:#e8c860;border:1px solid #5a4a3a;padding:5px 14px;cursor:pointer;
  font-size:11px;border-radius:4px;margin-top:5px;font-family:inherit;transition:all 0.15s}
.build-card button:hover{background:rgba(80,60,34,0.85);border-color:#8a7a5a}
.build-card button:disabled{background:rgba(20,14,8,0.6);color:#555;border-color:#2a1a0a;cursor:default}

/* Garden */
.garden-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px}
.garden-card{background:linear-gradient(135deg,rgba(30,22,14,0.9) 0%,rgba(22,16,10,0.95) 100%);
  border:1px solid #3a2a1a;border-radius:6px;padding:10px 8px;text-align:center;
  transition:all 0.2s}
.garden-card .name{color:#e8c860;font-size:13px}
.garden-card .desc{color:#8a7a6a;font-size:10px;line-height:1.4}
.garden-card .growth{color:#88aa88;font-size:10px}
.garden-card button{background:linear-gradient(180deg,rgba(60,44,28,0.8) 0%,rgba(40,28,16,0.9) 100%);
  color:#e8c860;border:1px solid #5a4a3a;padding:5px 14px;cursor:pointer;
  font-size:11px;border-radius:4px;margin-top:5px;font-family:inherit;transition:all 0.15s}
.garden-card button:hover{background:rgba(80,60,34,0.85);border-color:#8a7a5a}

/* Void trade */
.trade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:6px}
.trade-card{background:linear-gradient(135deg,rgba(20,8,20,0.9) 0%,rgba(14,4,14,0.95) 100%);
  border:1px solid #3a1a3a;border-radius:6px;padding:8px 6px;text-align:center;
  transition:all 0.2s}
.trade-card:hover{border-color:#5a2a5a}
.trade-card .name{color:#c8a0d8;font-size:11px}
.trade-card .cost{color:#d87093;font-size:9px}
.trade-card button{background:linear-gradient(180deg,rgba(50,20,50,0.8) 0%,rgba(30,10,30,0.9) 100%);
  color:#d8b0e8;border:1px solid #5a2a5a;padding:3px 10px;cursor:pointer;
  font-size:10px;border-radius:3px;margin-top:4px;font-family:inherit;transition:all 0.15s}
.trade-card button:hover{background:rgba(60,30,60,0.85)}
.trade-card button:disabled{background:rgba(10,5,10,0.5);color:#444}

/* Memory overlay - aged paper effect */
#memory-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:60;display:none;
  justify-content:center;align-items:center;flex-direction:column}
#memory-overlay.show{display:flex}
.memory-frame{position:relative;max-width:520px;padding:28px 24px;
  background:linear-gradient(135deg,rgba(40,30,20,0.85),rgba(25,18,10,0.9));
  border:2px solid #5a4a3a;border-radius:8px;
  box-shadow:0 0 40px rgba(139,200,240,0.08),inset 0 0 30px rgba(0,0,0,0.3)}
.memory-frame::before{content:'';position:absolute;inset:6px;border:1px solid rgba(90,74,58,0.3);border-radius:4px;pointer-events:none}
.memory-text{color:#c8d8e8;font-size:15px;text-align:center;text-shadow:0 0 8px rgba(139,200,240,0.2);
  line-height:2;font-style:italic;letter-spacing:0.5px}
.memory-hint{color:#6a5a4a;font-size:11px;margin-top:18px;text-align:center}

/* Scrollbar */
.panel::-webkit-scrollbar{width:6px}
.panel::-webkit-scrollbar-track{background:rgba(0,0,0,0.2);border-radius:3px}
.panel::-webkit-scrollbar-thumb{background:#4a3a2a;border-radius:3px}
.panel::-webkit-scrollbar-thumb:hover{background:#6a5a3a}
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- Info overlay -->
<div id="info">
  <span id="info-time">☀️ 早上 6:00</span>
  <span id="info-loc">📍 领地</span>
  <span id="info-level">🏠 领地 Lv.1</span>
</div>
<div id="msg"></div>

<!-- Hotbar (icons drawn via canvas) -->
<div id="ui">
  <div id="hotbar">
    <div class="slot selected" data-slot="0"><div class="item"><canvas width="32" height="32" id="icon-axe"></canvas></div></div>
    <div class="slot rarity-common" data-slot="1"><div class="item"><canvas width="32" height="32" id="icon-stone"></canvas></div><div class="count" id="cnt-stone">0</div></div>
    <div class="slot rarity-common" data-slot="2"><div class="item"><canvas width="32" height="32" id="icon-wood"></canvas></div><div class="count" id="cnt-wood">0</div></div>
    <div class="slot rarity-rare" data-slot="3"><div class="item"><canvas width="32" height="32" id="icon-starshard"></canvas></div><div class="count" id="cnt-starshard">0</div></div>
    <div class="slot rarity-common" data-slot="4"><div class="item"><canvas width="32" height="32" id="icon-herb"></canvas></div><div class="count" id="cnt-herb">0</div></div>
    <div class="slot rarity-uncommon" data-slot="5"><div class="item"><canvas width="32" height="32" id="icon-plank"></canvas></div><div class="count" id="cnt-plank">0</div></div>
    <div class="slot rarity-uncommon" data-slot="6"><div class="item"><canvas width="32" height="32" id="icon-ironIngot"></canvas></div><div class="count" id="cnt-ironIngot">0</div></div>
    <div class="slot rarity-epic" data-slot="7"><div class="item"><canvas width="32" height="32" id="icon-crystalShard"></canvas></div><div class="count" id="cnt-crystalShard">0</div></div>
  </div>
</div>

<!-- Mobile controls -->
<div class="mobile-ctrl" id="mobile_ctrl">
  <div class="row"><button class="spacer"></button><button onclick="Game.input('up')">▲</button><button class="spacer"></button></div>
  <div class="row"><button onclick="Game.input('left')">◀</button><button onclick="Game.input('act')">⚡</button><button onclick="Game.input('right')">▶</button></div>
  <div class="row"><button class="spacer"></button><button onclick="Game.input('down')">▼</button><button onclick="Game.input('tab')">📋</button></div>
</div>
<div id="controls">
  <button onclick="Game.input('act')" title="采集/对话">⚡</button>
  <button onclick="Game.input('tab')" title="菜单">📋</button>
  <button onclick="Game.input('build')" title="建造">🏗️</button>
</div>

<!-- Overlay panel -->
<div id="overlay">
  <div class="panel" id="panel">
    <button class="close-btn" onclick="togglePanel(null)">✕</button>
    <div class="panel-tabs" id="panel-tabs"></div>
    <div id="panel-content"></div>
  </div>
</div>

<!-- Memory fragment overlay -->
<div id="memory-overlay" onclick="closeMemory()">
  <div class="memory-frame">
    <div class="memory-text" id="memory-text"></div>
  </div>
  <div class="memory-hint">(点击任意位置关闭)</div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║           异世界开拓者 (Isekai Pioneer) v2.0                ║
// ║   二期: 制作系统 + 图鉴 + 新生物 + 建筑升级 + 菜园           ║
// ╚══════════════════════════════════════════════════════════════╝

const TILE = 32;
const WORLD_W = 60, WORLD_H = 40;

// ═══════════════════════════════════════════════════════════════
//  VISUAL UPGRADE v3: Palette, Icon System, Enhanced Renderers
//  Refined pixel art - earth tones, soft glow, layered detail
//  Inspired by GBA Golden Sun / Stardew Valley pixel art level
// ═══════════════════════════════════════════════════════════════

// ── Enhanced Color Palette ──
const PAL = {
  grass1: '#4a7c59', grass2: '#4d805c', grass3: '#487955',
  grassDetail: '#3d6b48', grassBlade: '#5a9068',
  water1: '#3a6d8c', water2: '#4488aa', waterDeep: '#2d5a75',
  waterShimmer: 'rgba(130,200,230,0.25)', waterFoam: 'rgba(180,220,240,0.3)',
  path1: '#9b8b75', path2: '#8a7a65', pathEdge: '#7a6a55',
  dirt1: '#6b5540', dirt2: '#5a4430',
  bridge1: '#8B7355', bridge2: '#6B5335', bridgeRail: '#9B8365',
  rockBase: '#7a7a7a', rockHighlight: '#9a9a9a', rockShadow: '#5a5a5a',
  ironRock: '#9a7a6a', ironHighlight: '#b09080', ironOreRed: '#c0553a',
  starRock: '#9b6fb0', starHighlight: '#c8a8d8', starGlow: 'rgba(255,105,180,0.3)',
  woodTrunk: '#5a4030', woodBark: '#4a3020', woodBarkLight: '#6b5040',
  leafDark: '#2d6a2f', leafMid: '#3a8c3f', leafLight: '#4da64d', leafHighlight: '#6abf6a',
  walkTreeTrunk: '#6b3fa0', walkTreeLeaf: '#8b5fc0', walkTreeHighlight: '#a070d0',
  skin: '#e8c89a', skinShadow: '#c8a878', skinHighlight: '#f0d8b0',
  hairBrown: '#5a3820', hairBrownLight: '#7a5030',
  clothBlue: '#4488cc', clothBlueDark: '#3366aa', clothBlueLight: '#66aadd',
  clothGreen: '#44aa44', clothGreenDark: '#338833',
  clothPurple: '#8866aa', clothPurpleDark: '#664488',
  stoneGray: '#8a8a8a', stoneHighlight: '#aeaeae', stoneShadow: '#666666',
  woodTan: '#b8956a', woodTanDark: '#8a6b4a', woodTanLight: '#d4b896',
  ironGray: '#7a8a9a', ironHighlight: '#aabbcc', ironDark: '#4a5a6a',
  crystalPink: '#c880a0', crystalHighlight: '#e8b0d0', crystalDark: '#885070',
  goldYellow: '#c8a040', goldBright: '#e8c860', goldDark: '#886020',
  berryRed: '#d44050', berryRedLight: '#e86070', berryRedDark: '#a02030',
  moonDewBlue: '#64b5f6', moonDewGlow: 'rgba(100,180,250,0.25)',
  bubbleWheatGold: '#ffd54f', bubbleGrain: '#fff9c4',
  fireFungusRed: '#e85d3a', fireFungusOrange: '#ff7043', fireFungusLight: '#ffab91',
  soilDark: '#5a4020', soilLight: '#4a3020', soilWet: '#3a2810',
  sproutGreen: '#8bc34a', growGreen: '#689f38', matureGreen: '#33691e',
  butterflyBlue: '#88ccff', butterflyLight: '#cceeff',
  snailBody: '#c8a882', snailHighlight: '#d8b892', snailEye: '#3a2a1a',
  jellyBlue: '#8be9fd', jellyDeep: '#4488bb', jellyTentacle: 'rgba(139,233,253,0.4)',
  voidPurple: '#442244', voidDark: '#1a0a1a', voidEye: '#c896ff',
  panelBg: 'rgba(18,12,8,0.96)', panelBorder: '#5a4a3a', panelAccent: '#c8a040',
  cardBg: '#1e1812', cardBorder: '#3a3028',
  textPrimary: '#d4c8b8', textGold: '#e8c860', textDim: '#8a7a6a',
  textGreen: '#88cc88', textRed: '#e88888', textPurple: '#c8a0d8', textBlue: '#88c8e8',
  glitch1: '#cc3388', glitch2: '#33cccc', glitch3: '#cccc33', glitch4: '#cc3333',
};

// ── OffscreenCanvas Caches ──
const ICON = 32, BEST = 64;
const iconCache = {}, bestiaryCache = {}, buildThumbCache = {};

function makeCanvas(w, h) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  return [c, c.getContext('2d')];
}

// ── Utility drawing helpers ──
function drawRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// Add highlight+shadow to a rectangular area
function addLighting(ctx, x, y, w, h) {
  ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fillRect(x+1, y+1, w-2, h*0.35);
  ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillRect(x+1, y+h*0.5, w-2, h*0.5-1);
}
function addTopHighlight(ctx, x, y, w) {
  ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(x+2, y+1, w-4, 2);
}

// ═══════════════════════════════
//  ITEM ICONS (32x32) - Pre-rendered
// ═══════════════════════════════

function drawIcon_axe() {
  const [c, ctx] = makeCanvas(ICON, ICON);
  // Handle

const iconDrawers = {
  axe: drawIcon_axe, stone: drawIcon_stone, wood: drawIcon_wood,
  starshard: drawIcon_starshard, herb: drawIcon_herb, plank: drawIcon_plank,
  ironIngot: drawIcon_ironIngot, crystalShard: drawIcon_crystalShard,
  stick: drawIcon_stick, ironOre: drawIcon_ironOre,
  starDew: drawIcon_starDew, bubbleGrain: drawIcon_bubbleGrain,
  fireFungus: drawIcon_fireFungus
};

function getIcon(name) {
  if (!iconCache[name] && iconDrawers[name]) iconCache[name] = iconDrawers[name]();
  return iconCache[name];
}

function renderAllIcons() {
  const names = ['axe','stone','wood','starshard','herb','plank','ironIngot','crystalShard'];
  names.forEach((n, i) => {
    const c = getIcon(n);
    const el = document.getElementById('icon-' + n);
    if (c && el) { const ctx = el.getContext('2d'); ctx.clearRect(0,0,ICON,ICON); ctx.drawImage(c,0,0); }
  });
}

  ctx.strokeStyle = '#c8a882'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(52, 34); ctx.quadraticCurveTo(56, 26, 54, 22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(48, 33); ctx.quadraticCurveTo(50, 24, 46, 20); ctx.stroke();
  ctx.fillStyle = '#666'; ctx.fillRect(52, 22, 2, 1); ctx.fillRect(44, 20, 2, 1);
  // Eyes
  ctx.fillStyle = '#3a2a1a'; ctx.fillRect(50, 37, 3, 3); ctx.fillRect(44, 37, 3, 3);
  // Crystal Shell
  const shellGrad = ctx.createRadialGradient(24, 32, 4, 24, 32, 18);
  shellGrad.addColorStop(0, 'rgba(255,180,220,0.6)');
  shellGrad.addColorStop(0.5, 'rgba(220,140,180,0.4)');
  shellGrad.addColorStop(1, 'rgba(160,80,120,0.6)');
  ctx.fillStyle = shellGrad; ctx.beginPath();
  ctx.arc(24, 32, 16, Math.PI, Math.PI*2); ctx.fill();
  // Shell facets
  ctx.strokeStyle = 'rgba(255,200,230,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(24, 16); ctx.lineTo(14, 32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(24, 16); ctx.lineTo(24, 32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(24, 16); ctx.lineTo(34, 32); ctx.stroke();
  // Glow points
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillRect(22, 18, 2, 2); ctx.fillRect(18, 22, 1, 1); ctx.fillRect(28, 20, 1, 1);
  return c;
}

function drawBestiary_memoryJelly() {
  const [c, ctx] = makeCanvas(BEST, BEST);
  ctx.fillStyle = '#0a0a18'; ctx.fillRect(0, 0, BEST, BEST);
  ctx.strokeStyle = '#1a2a3a'; ctx.lineWidth = 1; ctx.strokeRect(1, 1, BEST-2, BEST-2);
  // Ambient particles
  for (let i = 0; i < 8; i++) {
    ctx.fillStyle = 'rgba(139,233,253,0.2)';
    ctx.beginPath(); ctx.arc(10+Math.random()*44, 10+Math.random()*44, 1.5, 0, Math.PI*2); ctx.fill();
  }
  // Bell
  ctx.fillStyle = 'rgba(200,220,255,0.6)'; ctx.beginPath();
  ctx.arc(32, 20, 20, Math.PI, 0); ctx.fill();
  ctx.fillStyle = 'rgba(180,200,240,0.5)'; ctx.beginPath();
  ctx.arc(32, 18, 14, Math.PI*0.2, Math.PI*0.8); ctx.fill();
  // Inner core glow
  ctx.fillStyle = 'rgba(220,240,255,0.4)'; ctx.beginPath();
  ctx.arc(32, 22, 8, 0, Math.PI*2); ctx.fill();
  // Tentacles
  for (let i = 0; i < 5; i++) {
    const tx = 22 + i * 5;
    ctx.strokeStyle = 'rgba(139,233,253,0.35)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(tx, 38);
    ctx.quadraticCurveTo(tx + (i-2)*3, 46, tx + Math.sin(i)*2, 52);
    ctx.stroke();
    // Tentacle tips
    ctx.fillStyle = 'rgba(180,240,255,0.4)'; ctx.beginPath();
    ctx.arc(tx + Math.sin(i)*2, 52, 2, 0, Math.PI*2); ctx.fill();
  }
  // Memory fragments (tiny text-like pixels)
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(12, 10, 6, 1); ctx.fillRect(14, 12, 3, 1);
  ctx.fillRect(46, 8, 5, 1); ctx.fillRect(48, 10, 2, 1);
  return c;
}

function drawBestiary_voidMerchant() {
  const [c, ctx] = makeCanvas(BEST, BEST);
  ctx.fillStyle = '#0a000a'; ctx.fillRect(0, 0, BEST, BEST);
  // Reality tear
  ctx.strokeStyle = 'rgba(160,80,200,0.4)'; ctx.lineWidth = 1;
  drawRoundRect(ctx, 4, 4, BEST-8, BEST-8, 4); ctx.stroke();
  // Body shadow
  ctx.fillStyle = 'rgba(20,0,30,0.8)'; ctx.fillRect(16, 18, 32, 36);
  // Hood
  ctx.fillStyle = 'rgba(40,0,50,0.9)'; ctx.beginPath();
  ctx.moveTo(12, 30); ctx.lineTo(32, 4); ctx.lineTo(52, 30); ctx.closePath(); ctx.fill();
  // Hood folds
  ctx.strokeStyle = 'rgba(80,20,100,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(32, 4); ctx.lineTo(28, 30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(32, 4); ctx.lineTo(36, 30); ctx.stroke();
  // Arms (shadowy)
  ctx.fillStyle = 'rgba(30,0,40,0.7)';
  ctx.fillRect(4, 26, 14, 6); ctx.fillRect(46, 26, 14, 6);
  ctx.fillStyle = 'rgba(40,0,50,0.5)'; ctx.fillRect(4, 22, 6, 6); ctx.fillRect(54, 22, 6, 6);
  // Glowing eyes
  const eyeGlow = 0.8;
  ctx.fillStyle = `rgba(200,150,255,${eyeGlow})`; ctx.fillRect(22, 18, 6, 6); ctx.fillRect(36, 18, 6, 6);
  ctx.fillStyle = `rgba(230,200,255,${eyeGlow*0.6})`; ctx.fillRect(23, 19, 3, 3); ctx.fillRect(37, 19, 3, 3);
  // Floating star particles
  const stars = [[10,14],[50,10],[20,6],[44,14],[34,56],[18,54]];
  stars.forEach(([sx, sy]) => {
    ctx.fillStyle = 'rgba(200,150,255,0.5)'; ctx.fillRect(sx, sy, 2, 2);
    ctx.fillStyle = 'rgba(200,150,255,0.15)'; ctx.beginPath();
    ctx.arc(sx+1, sy+1, 3, 0, Math.PI*2); ctx.fill();
  });
  return c;
}

// ==================== 7. WORLD GENERATION ====================
function genWorld() {
  const w = new Array(WORLD_H).fill(null).map(() => new Array(WORLD_W).fill(null));
  for (let y = 0; y < WORLD_H; y++)
    for (let x = 0; x < WORLD_W; x++)
      w[y][x] = { tile: 'grass', variant: 0 };

  // River
  for (let y = 10; y < 28; y++)
    for (let dx = -1; dx <= 1; dx++) {
      const x = 28 + dx;
      if (x >= 0 && x < WORLD_W) w[y][x] = { tile: 'water', variant: 0 };
    }

  // Bridge
  w[18][28] = { tile: 'bridge', variant: 0 };
  w[19][28] = { tile: 'bridge', variant: 0 };

  // Trees
  const trees = [[8,12],[10,10],[12,14],[6,16],[20,8],[22,10],[25,13],[35,15],[38,12],[40,10],[42,16],[45,14],[48,9],[50,18],[30,22],[32,20],[34,24],[8,25],[10,28],[14,26]];
  trees.forEach(([x,y]) => { w[y][x] = { tile: 'tree', variant: (x+y)%3, harvested: false }; });

  // Rocks (some with iron ore)
  const rocks = [[9,20,false],[11,22,false],[13,18,false],[7,24,false],[22,15,true],[24,18,false],[36,20,true],[38,25,false],[43,22,false],[46,20,true],[33,26,false],[10,30,false]];
  rocks.forEach(([x,y,iron]) => { w[y][x] = { tile: 'rock', variant: (x+y)%2, harvested: false, ironOre: iron }; });

  // Berry bushes
  [[14,20],[16,22],[20,25],[23,20],[26,22],[44,18],[47,22]].forEach(([x,y]) => {
    w[y][x] = { tile: 'berry', variant: 0, harvested: false };
  });

  // ANOMALY: Floating rocks (east of river)
  for (let y = 14; y < 30; y += 3)
    for (let x = 33; x < 42; x += 4)
      if ((x + y) % 5 === 0 && !(x >= 37 && x <= 39 && y >= 20 && y <= 24))
        w[y][x] = { tile: 'float_rock', variant: (x+y)%3, harvested: false, offset: Math.random()*Math.PI*2 };

  // ANOMALY: Walking trees (far east)
  [[52,10],[54,12],[52,16],[55,20],[53,25],[56,28]].forEach(([x,y]) => {
    w[y][x] = { tile: 'walk_tree', variant: 0, phase: Math.random()*Math.PI*2, harvested: false };
  });

  // Home area - cleared
  for (let y = 14; y <= 22; y++)
    for (let x = 12; x <= 18; x++)
      if (w[y][x].tile === 'tree' || w[y][x].tile === 'rock') w[y][x] = { tile: 'grass', variant: 0 };

  // Dirt path from home to bridge
  for (let x = 18; x <= 28; x++) w[18][x] = { tile: 'path', variant: 0 };

  // Mystery edge (far east)
  for (let y = 5; y < 35; y++)
    for (let x = 57; x < 60; x++)
      w[y][x] = { tile: 'glitch', variant: 0 };

  return w;
}

// ==================== 11. BUILDING SYSTEM ====================
function canBuild(type) {
  const req = BUILDING_DB[type] ? BUILDING_DB[type].req : S.buildReqs[type];
  if (!req) return false;
  for (const [mat, amt] of Object.entries(req))
    if ((S.inventory[mat] || 0) < amt) return false;
  return true;
}

function tryBuild(type) {
  const req = BUILDING_DB[type] ? BUILDING_DB[type].req : S.buildReqs[type];
  if (!req) return false;
  if (!canBuild(type)) {
    const costStr = Object.entries(req).map(([k,v]) => `${v}${matIcon(k)}`).join('+');
    showMsg(`需要 ${costStr}`, '#ff6b6b');
    return false;
  }
  // Deduct materials
  for (const [mat, amt] of Object.entries(req))
    S.inventory[mat] -= amt;
  // Place building
  const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
  const dx = dirs[S.player.facing][0], dy = dirs[S.player.facing][1];
  const bx = Math.floor(S.player.x) + dx, by = Math.floor(S.player.y) + dy;
  // Don't build on water or glitch
  if (bx >= 0 && bx < WORLD_W && by >= 0 && by < WORLD_H) {
    const tile = S.worldData[by][bx];
    if (tile.tile === 'water' || tile.tile === 'glitch') {
      showMsg('这里不能建造！', '#ff6b6b');
      return false;
    }
  }
  S.buildings.push({ x: bx, y: by, type, level: 1 });
  showMsg(`建造完成！${BUILDING_DB[type]?.icon || '🏗️'} ${BUILDING_DB[type]?.name || type}`, '#ffd700');
  spawnParticles(bx*TILE+TILE/2, by*TILE+TILE/2, '#ffd700', 15);
  updateTerritory();
  return true;
}

function matIcon(name) {
  const icons = { wood:'🪵', stone:'🪨', starshard:'✨', herb:'🌿', plank:'🪵', stick:'🥢',
    ironOre:'🪨', ironIngot:'🔩', crystalShard:'💎', starDew:'💧' };
  return icons[name] || name;
}

function upgradeBuilding(building) {
  const costs = { 1: { wood: 5, stone: 5 }, 2: { wood: 10, stone: 8, ironIngot: 2 }, 3: { wood: 15, stone: 12, ironIngot: 4, starshard: 2 }, 4: { wood: 20, stone: 20, ironIngot: 6, starshard: 5 } };
  const cost = costs[building.level];
  if (!cost) { showMsg('已达最高等级！', '#ffd700'); return false; }
  for (const [mat, amt] of Object.entries(cost))
    if ((S.inventory[mat] || 0) < amt) {
      showMsg(`升级需要 ${Object.entries(cost).map(([k,v])=>`${v}${matIcon(k)}`).join('+')}`, '#ff6b6b');
      return false;
    }
  for (const [mat, amt] of Object.entries(cost)) S.inventory[mat] -= amt;
  building.level++;
  showMsg(`${BUILDING_DB[building.type]?.name||building.type} 升级到 Lv.${building.level}！`, '#ffd700');
  spawnParticles(building.x*TILE+TILE/2, building.y*TILE+TILE/2, '#ffd700', 20);
  updateTerritory();
  return true;
}

function updateTerritory() {
  const totalBuildings = S.buildings.length;
  const totalLevels = S.buildings.reduce((s, b) => s + b.level, 0);
  let newLevel = 1;
  if (totalLevels >= 15) newLevel = 5;
  else if (totalLevels >= 10) newLevel = 4;
  else if (totalLevels >= 6) newLevel = 3;
  else if (totalLevels >= 3) newLevel = 2;

  if (newLevel !== S.territoryLevel) {
    S.territoryLevel = newLevel;
    S.territoryRadius = 3 + newLevel;
    showMsg(`🏠 领地升级！Lv.${newLevel} — 范围扩大了`, '#ffd700');
    spawnParticles(15.5*TILE, 17.5*TILE, '#ffd700', 25);
  }
}

function isNearStation(stationType) {
  const px = S.player.x, py = S.player.y;
  return S.buildings.some(b => {
    if (b.type !== stationType) return false;
    return Math.abs(b.x + 0.5 - px) < 3 && Math.abs(b.y + 0.5 - py) < 3;
  });
}

function canCraft(recipe) {
  for (const [mat, amt] of Object.entries(recipe.input))
    if ((S.inventory[mat] || 0) < amt) return false;
  return true;
}

function doCraft(recipeId) {
  const recipe = RECIPES.find(r => r.id === recipeId);
  if (!recipe) return;
  if (!canCraft(recipe)) { showMsg('材料不足！', '#ff6b6b'); return; }
  if (!isNearStation(recipe.station)) {
    const sname = BUILDING_DB[recipe.station]?.name || recipe.station;
    showMsg(`需要靠近${sname}！`, '#ff6b6b');
    return;
  }
  for (const [mat, amt] of Object.entries(recipe.input)) S.inventory[mat] -= amt;
  for (const [mat, amt] of Object.entries(recipe.output)) S.inventory[mat] = (S.inventory[mat]||0) + amt;
  showMsg(`制作完成：${recipe.name} +${Object.values(recipe.output)[0]}`, '#88ff88');
  updateUI();
  renderPanel();
}

// ==================== 13. GARDEN / CROP SYSTEM ====================
function plantCrop(building, cropType) {
  if (building.type !== 'garden') return;
  // Check if garden has space (max 4 plots)
  const existingPlots = S.crops.filter(c => c.gardenX === building.x && c.gardenY === building.y).length;
  if (existingPlots >= 4) { showMsg('菜园已满！', '#ff6b6b'); return; }
  const seedCost = { moonDew: { herb: 2 }, bubbleWheat: { herb: 1, wood: 1 }, fireFungus: { herb: 2, ironOre: 1 } };
  const cost = seedCost[cropType];
  for (const [mat, amt] of Object.entries(cost))
    if ((S.inventory[mat] || 0) < amt) { showMsg('材料不足！', '#ff6b6b'); return; }
  for (const [mat, amt] of Object.entries(cost)) S.inventory[mat] -= amt;
  const plotIdx = existingPlots;
  const offX = [0.3, 0.7, 0.3, 0.7][plotIdx];
  const offY = [0.2, 0.2, 0.6, 0.6][plotIdx];
  S.crops.push({
    x: building.x + offX, y: building.y + offY,
    type: cropType, growth: 0,
    gardenX: building.x, gardenY: building.y,
    plotIdx
  });
  showMsg(`种下了 ${CROP_DB[cropType].icon} ${CROP_DB[cropType].name}`, '#88ff88');
  updateUI();
}

function harvestCrop(cropIdx) {
  const crop = S.crops[cropIdx];
  if (!crop || crop.growth < 1) return;
  const def = CROP_DB[crop.type];
  for (const [item, amt] of Object.entries(def.harvest))
    S.inventory[item] = (S.inventory[item]||0) + amt;
  spawnParticles(crop.x*TILE+TILE/2, crop.y*TILE+TILE/2, '#ffd700', 8);
  showMsg(`收获 ${def.icon} ${def.name}！`, '#88ff88');
  // Reset crop
  crop.growth = 0;
  updateUI();
}

// ==================== 14. VOID TRADING ====================
function tradeWithVoid(merchant, item, amount) {
  const price = merchant.prices[item] || 5;
  if ((S.inventory[merchant.wants] || 0) < price) {
    showMsg(`${matIcon(merchant.wants)}不足！虚空商贩想要 ${merchant.wants}`, '#ff6b6b');
    return;
  }
  if ((S.inventory[item] || 0) >= 99) { showMsg('背包已满！', '#ff6b6b'); return; }
  S.inventory[merchant.wants] -= price;
  S.inventory[item] = (S.inventory[item]||0) + 1;
  showMsg(`交易完成：${price}${matIcon(merchant.wants)} → 1${matIcon(item)}`, '#dda0dd');
  // Merchant prices change after trade
  merchant.prices[item] = Math.max(1, (merchant.prices[item] || 5) + Math.floor(Math.random()*3) - 1);
  updateUI();
}

// ==================== 15. INPUT HANDLING ====================
Game = {
  input(action) {
    if (action === 'tab') { togglePanel('main'); return; }
    if (S.memoryShowing) { closeMemory(); return; }

    switch(action) {
      case 'act': {
        const px = Math.floor(S.player.x + 0.5), py = Math.floor(S.player.y + 0.5);
        const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
        const dx = dirs[S.player.facing][0], dy = dirs[S.player.facing][1];
        const tx = px + dx, ty = py + dy;

        // Check NPC
        const npc = S.npcs.find(n => Math.abs(tx - n.x) + Math.abs(ty - n.y) <= 1);
        if (npc) { talkNPC(npc); return; }

        // Check buildings (upgrade)
        const building = S.buildings.find(b => b.x === tx && b.y === ty);
        if (building) {
          if (building.type === 'garden') {
            // Open garden UI
            S.panelSubTab = 0;
            togglePanel('garden', building);
            return;
          }
          // Try upgrade
          upgradeBuilding(building);
          updateUI();
          return;
        }

        // Check creatures
        const creature = S.creatures.find(c => Math.abs(tx - c.x) + Math.abs(ty - c.y) <= 1.5);
        if (creature) { interactCreature(creature); return; }

        // Check tile
        if (tx >= 0 && tx < WORLD_W && ty >= 0 && ty < WORLD_H) {
          const tile = S.worldData[ty][tx];
          if (tile.tile === 'tree' && !tile.harvested) {
            tile.harvested = true; S.inventory.wood += 2;
            spawnParticles(tx*TILE+TILE/2, ty*TILE+TILE/2, '#8B6914', 6);
            showMsg('+2 🪵 木材', '#c4956a'); updateUI();
          } else if (tile.tile === 'rock' && !tile.harvested) {
            tile.harvested = true;
            S.inventory.stone += 2;
            if (tile.ironOre) { S.inventory.ironOre = (S.inventory.ironOre||0) + 1; showMsg('+2 🪨 石头 +1 🪨 铁矿石', '#a0a0a0'); }
            else showMsg('+2 🪨 石头', '#a0a0a0');
            spawnParticles(tx*TILE+TILE/2, ty*TILE+TILE/2, '#808080', 6);
            if (tile.ironOre && !S.discoveries.includes('ironOre')) { discoverBestiary('ironOre'); }
            updateUI();
          } else if (tile.tile === 'float_rock' && !tile.harvested) {
            tile.harvested = true; S.inventory.starshard += 1; S.inventory.stone += 1;
            spawnParticles(tx*TILE+TILE/2, ty*TILE+TILE/2, '#ff69b4', 12);
            showMsg('+1 ✨ 星之碎片！', '#ff69b4');
            discoverBestiary('float_rock'); updateUI();
          } else if (tile.tile === 'berry' && !tile.harvested) {
            tile.harvested = true; S.inventory.herb += 2;
            spawnParticles(tx*TILE+TILE/2, ty*TILE+TILE/2, '#ff6b6b', 4);
            showMsg('+2 🌿 野莓', '#ff6b6b'); updateUI();
          } else if (tile.tile === 'walk_tree' && !tile.harvested) {
            tile.harvested = true; S.inventory.wood += 3;
            spawnParticles(tx*TILE+TILE/2, ty*TILE+TILE/2, '#9b59b6', 10);
            showMsg('+3 🪵 活木！', '#9b59b6');
            discoverBestiary('walk_tree'); updateUI();
          }
        }
        break;
      }
      case 'build': togglePanel('building'); break;
    }
  }
};

function interactCreature(creature) {
  switch(creature.type) {
    case 'mirror_butterfly':
      // Reveals nearby resources
      const nearby = [];
      for (let dy = -5; dy <= 5; dy++)
        for (let dx = -5; dx <= 5; dx++) {
          const cx = Math.floor(creature.x + dx), cy = Math.floor(creature.y + dy);
          if (cx >= 0 && cx < WORLD_W && cy >= 0 && cy < WORLD_H) {
            const t = S.worldData[cy][cx];
            if (!t.harvested && (t.tile === 'float_rock' || t.tile === 'walk_tree' || t.ironOre))
              nearby.push(t);
          }
        }
      if (nearby.length > 0) {
        showMsg(`🦋 镜面蝶映出了 ${nearby.length} 处隐藏资源！`, '#88ccff');
        // Flash particles at those locations
        nearby.forEach(() => spawnParticles(creature.x*TILE+Math.random()*TILE*10, creature.y*TILE+Math.random()*TILE*10, '#88ccff', 3));
      } else {
        showMsg('🦋 蝶群轻轻飞舞，一切安好。', '#88ccff');
      }
      spawnParticles(creature.x*TILE, creature.y*TILE, '#88ccff', 15);
      discoverBestiary('mirror_butterfly');
      break;

    case 'crystal_snail':
      if (S.time > 900 || S.time < 360) {
        // Night: collect crystal shard
        S.inventory.crystalShard = (S.inventory.crystalShard||0) + 1;
        showMsg('🐌 蜗牛壳折射出一片晶片！+1 💎', '#ff69b4');
        spawnParticles(creature.x*TILE, creature.y*TILE, '#ff69b4', 10);
      } else {
        showMsg('🐌 晶壳蜗牛正在蓄光...晚上再来吧。', '#ffaa88');
      }
      discoverBestiary('crystal_snail');
      break;

    case 'memory_jelly':
      S.memoryShowing = true;
      S.currentMemory = MEMORIES[S.nextMemoryIdx % MEMORIES.length];
      S.nextMemoryIdx++;
      document.getElementById('memory-text').textContent = S.currentMemory;
      document.getElementById('memory-overlay').classList.add('show');
      discoverBestiary('memory_jelly');
      break;

    case 'void_merchant':
      S.panelSubTab = 0;
      togglePanel('trade', creature);
      break;
  }
}

function closeMemory() {
  S.memoryShowing = false;
  document.getElementById('memory-overlay').classList.remove('show');
}

function talkNPC(npc) {
  const msg = npc.dialogs[npc.dialogIdx % npc.dialogs.length];
  npc.dialogIdx++;
  showMsg(`"${msg}"`, '#88ff88');
  spawnParticles(npc.x*TILE+TILE/2, npc.y*TILE+TILE/2, '#88ff88', 8);
}

// ==================== 18. PLAYER UPDATE ====================
function updatePlayer() {
  let mx = 0, my = 0;
  if (S.keys['ArrowUp'] || S.keys['w']) my = -1;
  if (S.keys['ArrowDown'] || S.keys['s']) my = 1;
  if (S.keys['ArrowLeft'] || S.keys['a']) mx = -1;
  if (S.keys['ArrowRight'] || S.keys['d']) mx = 1;

  if (mx !== 0 || my !== 0) {
    const len = Math.sqrt(mx*mx + my*my);
    mx /= len; my /= len;
    S.player.vx = mx * S.player.speed;
    S.player.vy = my * S.player.speed;
    if (Math.abs(mx) > Math.abs(my)) S.player.facing = mx > 0 ? 1 : 3;
    else S.player.facing = my > 0 ? 2 : 0;
  } else {
    S.player.vx *= 0.8; S.player.vy *= 0.8;
    if (Math.abs(S.player.vx) < 0.1) S.player.vx = 0;
    if (Math.abs(S.player.vy) < 0.1) S.player.vy = 0;
  }

  let nx = S.player.x + S.player.vx * 0.016;
  let ny = S.player.y + S.player.vy * 0.016;

  // Collision
  const margin = 0.3;
  const blocked = ['water','tree','rock','glitch'];
  for (let dy = -1; dy <= 1; dy++)
    for (let dx = -1; dx <= 1; dx++) {
      const tx = Math.floor(nx + dx * margin), ty = Math.floor(ny + dy * margin);
      if (tx < 0 || tx >= WORLD_W || ty < 0 || ty >= WORLD_H) continue;
      const tile = S.worldData[ty][tx];
      if (blocked.includes(tile.tile)) {
        if (tile.harvested && (tile.tile === 'tree' || tile.tile === 'rock')) continue;
        const cx = tx + 0.5, cy = ty + 0.5;
        if (Math.abs(nx + dx * margin - cx) < 0.5 && Math.abs(ny + dy * margin - cy) < 0.5) {
          const px = nx + dx * margin, py = ny + dy * margin;
          if (Math.abs(px - cx) > Math.abs(py - cy)) nx = cx + Math.sign(px - cx) * 0.55;
          else ny = cy + Math.sign(py - cy) * 0.55;
        }
      }
    }

  S.player.x = Math.max(0.5, Math.min(WORLD_W - 0.5, nx));
  S.player.y = Math.max(0.5, Math.min(WORLD_H - 0.5, ny));

  // Check glitch edge
  if (S.player.x > 55) discoverBestiary('glitch');
}

function updateTime() {
  S.time += S.daySpeed * 0.016;
  if (S.time >= 1440) { S.time = 360; showMsg('☀️ 新的一天开始了！', '#ffd700'); }
}

function updateCreatures() {
  S.creatures.forEach(c => {
    if (c.type === 'mirror_butterfly') {
      c.phase += c.flapSpeed;
      // Slowly drift
      c.x += Math.sin(c.phase * 0.7) * 0.005;
      c.y += Math.cos(c.phase * 0.5) * 0.005;
    }
    else if (c.type === 'crystal_snail') {
      c.phase += 0.01;
      c.x += c.speed * c.direction;
      // Random direction changes
      if (Math.random() < 0.005) c.direction *= -1;
      // Charge during day, discharge at night
      if (S.time > 360 && S.time < 900) c.charge = Math.min(1, c.charge + 0.0005);
      else c.charge = Math.max(0, c.charge - 0.001);
      // Bounds check
      if (c.x < 26 || c.x > 34) c.direction *= -1;
    }
    else if (c.type === 'memory_jelly') {
      c.phase += 0.015;
      c.floatOffset += 0.02;
      c.y += Math.sin(c.floatOffset) * 0.003;
      c.x += Math.cos(c.floatOffset * 0.7) * 0.002;
    }
    else if (c.type === 'void_merchant') {
      c.phase += 0.008;
    }
  });

  // Void merchant timer
  S.voidTraderTimer -= 0.016;
  if (S.voidTraderTimer <= 0 && !S.creatures.some(c => c.type === 'void_merchant')) {
    spawnVoidMerchant();
    S.voidTraderTimer = 800 + Math.random() * 800;
  }
}

function updateCrops() {
  S.crops.forEach(crop => {
    if (crop.growth >= 1) return; // Already mature
    const def = CROP_DB[crop.type];
    let growthRate = 0.00015; // Base growth per tick

    // Night-only crops grow only at night (900-1440)
    if (def.nightOnly && (S.time > 360 && S.time < 900)) growthRate = 0;

    // Heat boost: faster near furnace
    if (def.heatBoost) {
      const nearFurnace = S.buildings.some(b =>
        b.type === 'furnace' && Math.abs(b.x + 0.5 - crop.x) < 3 && Math.abs(b.y + 0.5 - crop.y) < 3);
      if (nearFurnace) growthRate *= 3;
    }

    crop.growth = Math.min(1, crop.growth + growthRate);
  });
}

// ==================== 20. RENDERING ====================
function drawTile(ctx, x, y, tile) {
  const px = x * TILE, py = y * TILE;
  ctx.imageSmoothingEnabled = false;
  switch (tile.tile) {
    case 'grass': {
      ctx.fillStyle = [PAL.grass1,PAL.grass2,PAL.grass3][tile.variant%3];
      ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = PAL.grassBlade;
      ctx.fillRect(px+2, py+6, 2, 4); ctx.fillRect(px+14, py+10, 2, 3);
      ctx.fillRect(px+24, py+4, 1, 3); ctx.fillRect(px+8, py+18, 2, 4);
      ctx.fillRect(px+20, py+22, 1, 3); ctx.fillRect(px+28, py+14, 2, 2);
      ctx.fillStyle = PAL.grassDetail; ctx.fillRect(px, py+28, TILE, 4);
      break;
    }
    case 'water': {
      ctx.fillStyle = PAL.water1; ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = PAL.waterDeep; ctx.fillRect(px, py+24, TILE, 8);
      const wv1 = Math.sin((x+S.time*0.025)*0.6)*2.5;
      const wv2 = Math.cos((y+S.time*0.02)*0.5)*2;
      ctx.fillStyle = PAL.waterShimmer; ctx.fillRect(px, py+TILE/2+wv1, TILE, 5);
      ctx.fillStyle = PAL.waterFoam; ctx.fillRect(px, py+TILE-6+wv2, TILE, 2);
      ctx.fillStyle = 'rgba(180,220,240,0.12)'; ctx.fillRect(px, py, TILE, 1);
      break;
    }
    case 'bridge': {
      ctx.fillStyle = PAL.bridge1; ctx.fillRect(px, py, TILE+2, TILE);
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = i%2===0 ? PAL.bridge2 : PAL.bridge1;
        ctx.fillRect(px+i*9, py, 5, TILE);
      }
      ctx.fillStyle = PAL.bridgeRail; ctx.fillRect(px, py+2, TILE, 3);
      ctx.fillRect(px, py+TILE-5, TILE, 3);
      ctx.fillStyle = PAL.bridge2;
      ctx.fillRect(px+1, py, 2, TILE); ctx.fillRect(px+TILE-2, py, 2, TILE);
      break;
    }
    case 'path': {
      ctx.fillStyle = PAL.path1; ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = PAL.path2; ctx.fillRect(px+4, py+6, 6, 4);
      ctx.fillRect(px+18, py+16, 8, 4); ctx.fillRect(px+8, py+24, 10, 4);
      ctx.fillStyle = PAL.pathEdge; ctx.fillRect(px, py, TILE, 1);
      ctx.fillRect(px, py+TILE-1, TILE, 1);
      break;
    }
    case 'tree': {
      ctx.fillStyle = [PAL.grass1,PAL.grass2,PAL.grass3][tile.variant%3];
      ctx.fillRect(px, py, TILE, TILE);
      if (!tile.harvested) {
        ctx.fillStyle = PAL.woodTrunk; ctx.fillRect(px+13, py+16, 6, 16);
        ctx.fillStyle = PAL.woodBarkLight; ctx.fillRect(px+13, py+16, 2, 16);
        ctx.fillStyle = PAL.leafDark; ctx.beginPath();
        ctx.arc(px+16, py+10, 13, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = PAL.leafMid; ctx.beginPath();
        ctx.arc(px+16, py+8, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = PAL.leafLight; ctx.beginPath();
        ctx.arc(px+14, py+6, 5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(px+20, py+8, 4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = PAL.leafHighlight;
        ctx.fillRect(px+10, py+2, 3, 2); ctx.fillRect(px+18, py+3, 2, 2);
      } else { ctx.fillStyle = PAL.woodTrunk; ctx.fillRect(px+14, py+22, 4, 6); }
      break;
    }
    case 'rock': {
      ctx.fillStyle = [PAL.grass1,PAL.grass2,PAL.grass3][tile.variant%3];
      ctx.fillRect(px, py, TILE, TILE);
      if (!tile.harvested) {
        const base = tile.ironOre ? PAL.ironRock : PAL.rockBase;
        const hi = tile.ironOre ? PAL.ironHighlight : PAL.rockHighlight;
        const lo = tile.ironOre ? '#8a5a4a' : PAL.rockShadow;
        ctx.fillStyle = base; ctx.beginPath();
        ctx.moveTo(px+5, py+28); ctx.lineTo(px+8, py+8); ctx.lineTo(px+18, py+4);
        ctx.lineTo(px+24, py+10); ctx.lineTo(px+28, py+18); ctx.lineTo(px+22, py+28);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = hi; ctx.beginPath();
        ctx.moveTo(px+9, py+12); ctx.lineTo(px+18, py+5); ctx.lineTo(px+23, py+12); ctx.closePath(); ctx.fill();
        ctx.fillStyle = lo; ctx.beginPath();
        ctx.moveTo(px+23, py+12); ctx.lineTo(px+28, py+18); ctx.lineTo(px+22, py+28);
        ctx.lineTo(px+18, py+26); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(px+13, py+8); ctx.lineTo(px+17, py+16); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px+24, py+15); ctx.lineTo(px+22, py+22); ctx.stroke();
        if (tile.ironOre) {
          ctx.fillStyle = PAL.ironOreRed; ctx.beginPath();
          ctx.arc(px+16, py+14, 3.5, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = 'rgba(255,180,100,0.4)'; ctx.beginPath();
          ctx.arc(px+15, py+13, 1.5, 0, Math.PI*2); ctx.fill();
        }
      }
      break;
    }
    case 'berry': {
      ctx.fillStyle = [PAL.grass1,PAL.grass2,PAL.grass3][tile.variant%3];
      ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = '#4a6a2f'; ctx.fillRect(px+12, py+14, 8, 20);
      ctx.fillStyle = '#5a7a3f'; ctx.fillRect(px+12, py+14, 3, 20);
      if (!tile.harvested) {
        ctx.fillStyle = PAL.berryRedDark; ctx.beginPath();
        ctx.arc(px+15, py+14, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = PAL.berryRed; ctx.beginPath();
        ctx.arc(px+19, py+16, 4.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = PAL.berryRedDark; ctx.beginPath();
        ctx.arc(px+11, py+18, 4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = PAL.berryRedLight;
        ctx.beginPath(); ctx.arc(px+14, py+13, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(px+18, py+15, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(px+10, py+17, 1, 0, Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'float_rock': {
      ctx.fillStyle = [PAL.grass1,PAL.grass2,PAL.grass3][tile.variant%3];
      ctx.fillRect(px, py, TILE, TILE);
      if (!tile.harvested) {
        const floatY = Math.sin(S.time*0.03+tile.offset)*7;
        ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.beginPath();
        ctx.ellipse(px+16, py+28, 12, 3, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = PAL.starRock; ctx.beginPath();
        ctx.moveTo(px+10, py+22+floatY); ctx.lineTo(px+4, py+8+floatY);
        ctx.lineTo(px+16, py+2+floatY); ctx.lineTo(px+26, py+8+floatY);
        ctx.lineTo(px+24, py+22+floatY); ctx.closePath(); ctx.fill();
        ctx.fillStyle = PAL.starHighlight; ctx.beginPath();
        ctx.moveTo(px+10, py+12+floatY); ctx.lineTo(px+16, py+4+floatY);
        ctx.lineTo(px+24, py+12+floatY); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = PAL.starGlow; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(px+16, py+13+floatY, 14, 0, Math.PI*2); ctx.stroke();
        const sx2 = px+16, sy2 = py+13+floatY;
        ctx.fillStyle = 'rgba(255,200,230,0.7)'; ctx.fillRect(sx2-5, sy2-6, 1, 1);
        ctx.fillStyle = 'rgba(255,180,220,0.5)'; ctx.fillRect(sx2+8, sy2-2, 1, 1);
        ctx.fillRect(sx2-8, sy2+4, 1, 1);
      }
      break;
    }
    case 'walk_tree': {
      ctx.fillStyle = [PAL.grass1,PAL.grass2,PAL.grass3][tile.variant%3];
      ctx.fillRect(px, py, TILE, TILE);
      if (!tile.harvested) {
        const moveX = Math.sin(S.time*0.015+tile.phase)*4;
        ctx.fillStyle = '#5a30a0';
        ctx.fillRect(px+10+moveX, py+28, 4, 5); ctx.fillRect(px+18+moveX, py+27, 4, 6);
        ctx.fillStyle = PAL.walkTreeTrunk; ctx.fillRect(px+12+moveX, py+14, 8, 18);
        ctx.fillStyle = '#7b50b0'; ctx.fillRect(px+12+moveX, py+14, 3, 18);
        ctx.fillStyle = PAL.walkTreeLeaf; ctx.beginPath();
        ctx.arc(px+16+moveX, py+8, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = PAL.walkTreeHighlight; ctx.beginPath();
        ctx.arc(px+16+moveX, py+6, 9, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#3a1060'; ctx.fillRect(px+12+moveX, py+10, 3, 4);
        ctx.fillRect(px+18+moveX, py+10, 3, 4);
        ctx.fillStyle = '#ffcc00'; ctx.fillRect(px+13+moveX, py+11, 1, 1);
        ctx.fillRect(px+19+moveX, py+11, 1, 1);
        ctx.fillStyle = 'rgba(180,150,210,0.2)'; ctx.fillRect(px+6, py+30, 8, 2);
        ctx.fillRect(px+24, py+30, 5, 2);
      }
      break;
    }
    case 'glitch': {
      const gx = Math.floor(Math.random()*4);
      ctx.fillStyle = [PAL.glitch1,PAL.glitch2,PAL.glitch3,PAL.glitch4][gx];
      ctx.fillRect(px, py, TILE/2, TILE/2);
      ctx.fillStyle = [PAL.glitch3,PAL.glitch4,PAL.glitch1,PAL.glitch2][gx];
      ctx.fillRect(px+TILE/2, py+TILE/2, TILE/2, TILE/2);
      ctx.fillStyle = '#000';
      ctx.fillRect(px+TILE/2, py, TILE/2, TILE/2);
      ctx.fillRect(px, py+TILE/2, TILE/2, TILE/2);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(px, py+8, TILE, 1); ctx.fillRect(px, py+20, TILE, 1);
      ctx.fillStyle = '#ff0'; ctx.fillRect(px+20, py+6, 3, 3);
      ctx.fillStyle = 'rgba(255,255,0,0.4)'; ctx.fillRect(px+17, py+3, 3, 3);
      break;
    }
  }
}

function drawCreature(ctx, creature, camX, camY) {
  const sx = creature.x * TILE - camX, sy = creature.y * TILE - camY;
  ctx.imageSmoothingEnabled = false;
  if(creature.type==='mirror_butterfly'){
    for(let i=0;i<5;i++){
      const bx=sx+Math.sin(creature.phase+i*1.6)*10;
      const by=sy+Math.cos(creature.phase*0.7+i*1.3)*7-2;
      const alpha=0.35+Math.sin(creature.phase*2.3+i)*0.25;
      const flap=Math.sin(creature.phase*4+i)*0.4+0.6;
      ctx.fillStyle='rgba(120,200,255,'+alpha+')';
      ctx.fillRect(bx-3,by-1,Math.floor(3*flap),3);
      ctx.fillRect(bx+1,by-1,Math.floor(3*flap),3);
      ctx.fillStyle='rgba(180,230,255,'+(alpha+0.15)+')';
      ctx.fillRect(bx-2,by-3,Math.floor(2*flap),2);
      ctx.fillRect(bx+2,by-3,Math.floor(2*flap),2);
      if(Math.sin(creature.phase*3.5+i)>0.7){
        ctx.fillStyle='rgba(255,255,255,'+(alpha+0.25)+')';ctx.fillRect(bx,by-4,1,1);
      }
    }
  }else if(creature.type==='crystal_snail'){
    ctx.fillStyle='rgba(180,200,220,0.1)';ctx.fillRect(sx,sy+22,20,4);
    ctx.fillStyle=PAL.snailBody;ctx.fillRect(sx+3,sy+12,16,8);
    ctx.fillStyle=PAL.snailHighlight;ctx.fillRect(sx+3,sy+12,8,8);
    ctx.fillStyle=PAL.snailHighlight;ctx.fillRect(sx+17,sy+10,7,7);
    ctx.fillStyle=PAL.snailBody;ctx.fillRect(sx+20,sy+8,1,4);ctx.fillRect(sx+18,sy+7,1,4);
    ctx.fillStyle=PAL.snailEye;ctx.fillRect(sx+19,sy+8,2,1);ctx.fillRect(sx+17,sy+7,2,1);
    const ca=creature.charge||0;const isNight=S.time>900||S.time<360;
    if(isNight&&ca>0){const gf=Math.sin(S.time*0.06+creature.phase)*0.25+0.6;
      ctx.fillStyle='rgba(255,140,200,'+(ca*gf*0.7)+')';ctx.beginPath();ctx.arc(sx+8,sy+8,11,0,Math.PI*2);ctx.fill();}
    const hue=isNight?ca*300:200;
    ctx.fillStyle='hsl('+hue+',65%,'+(48+ca*22)+'%)';ctx.beginPath();ctx.arc(sx+8,sy+7,10,Math.PI,Math.PI*2);ctx.fill();
    const ra=creature.phase*0.1;ctx.strokeStyle='hsla('+hue+',75%,70%,0.45)';ctx.lineWidth=1;
    for(let a=0;a<3;a++){const angle=ra+a*Math.PI/3;ctx.beginPath();ctx.moveTo(sx+8,sy-3);ctx.lineTo(sx+8+Math.cos(angle)*10,sy+7+Math.sin(angle)*8);ctx.stroke();}
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect(sx+6,sy+1,1,1);ctx.fillRect(sx+10,sy,1,1);
  }else if(creature.type==='memory_jelly'){
    const bobY=Math.sin(creature.floatOffset)*5;
    const ja=0.55+Math.sin(S.time*0.05)*0.2;
    for(let i=0;i<5;i++){
      const tx=sx+4+i*6;const sw=Math.sin(creature.floatOffset*0.8+i*0.7)*2.5;
      ctx.strokeStyle='rgba(139,233,253,'+(ja*0.45)+')';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(tx,sy+18+bobY);ctx.quadraticCurveTo(tx+sw,sy+26+bobY,tx+sw*1.5,sy+30+bobY);ctx.stroke();
      ctx.fillStyle='rgba(180,240,255,'+(ja*0.3)+')';ctx.beginPath();ctx.arc(tx+sw*1.5,sy+30+bobY,2,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='rgba(190,210,250,'+ja+')';ctx.beginPath();ctx.arc(sx+16,sy+12+bobY,13,Math.PI,0);ctx.fill();
    ctx.fillStyle='rgba(170,190,240,'+(ja*0.75)+')';ctx.beginPath();ctx.arc(sx+16,sy+10+bobY,8,Math.PI*0.18,Math.PI*0.82);ctx.fill();
    const pulse=Math.sin(S.time*0.07)*0.15+0.45;
    ctx.fillStyle='rgba(220,240,255,'+pulse+')';ctx.beginPath();ctx.arc(sx+16,sy+13+bobY,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,'+(pulse*0.6)+')';ctx.beginPath();ctx.arc(sx+16,sy+12+bobY,2,0,Math.PI*2);ctx.fill();
  }else if(creature.type==='void_merchant'){
    const vb=Math.sin(creature.phase)*2;
    const va=0.45+Math.sin(S.time*0.04)*0.15;
    ctx.strokeStyle='rgba(160,80,200,'+va+')';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(sx+4,sy+4);ctx.lineTo(sx+28,sy+4);ctx.lineTo(sx+28,sy+30);ctx.lineTo(sx+4,sy+30);ctx.closePath();ctx.stroke();
    ctx.fillStyle='rgba(18,0,28,'+(va+0.25)+')';ctx.fillRect(sx+7,sy+9+vb,18,22);
    ctx.fillStyle='rgba(35,0,45,'+(va+0.35)+')';ctx.beginPath();ctx.moveTo(sx+5,sy+14+vb);ctx.lineTo(sx+16,sy);ctx.lineTo(sx+27,sy+14+vb);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(70,15,90,0.3)';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(sx+16,sy+1);ctx.lineTo(sx+12,sy+14+vb);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+16,sy+1);ctx.lineTo(sx+20,sy+14+vb);ctx.stroke();
    const eg=Math.sin(S.time*0.09)*0.25+0.7;
    ctx.fillStyle='rgba(200,150,255,'+eg+')';ctx.fillRect(sx+11,sy+10+vb,4,5);ctx.fillRect(sx+18,sy+10+vb,4,5);
    ctx.fillStyle='rgba(255,220,255,'+(eg*0.5)+')';ctx.fillRect(sx+12,sy+11+vb,1,1);ctx.fillRect(sx+19,sy+11+vb,1,1);
    for(let i=0;i<4;i++){
      const sxv=sx+6+Math.sin(creature.phase+i*1.7)*8+Math.cos(creature.phase*0.5+i)*6;
      const syv=sy+6+Math.cos(creature.phase*0.8+i*1.4)*8+Math.sin(creature.phase+i)*5;
      ctx.fillStyle='rgba(180,120,240,'+(0.3+Math.sin(creature.phase*2+i)*0.2)+')';
      ctx.fillRect(sxv,syv,2,2);
    }
  }
}}

function drawCrop(ctx, crop, camX, camY) {
  const sx = crop.x * TILE - camX, sy = crop.y * TILE - camY;
  const def = CROP_DB[crop.type];
  const g = crop.growth;
  ctx.fillStyle = PAL.soilDark; ctx.fillRect(sx-2, sy-2, 20, 20);
  ctx.fillStyle = PAL.soilLight; ctx.fillRect(sx, sy, 16, 16);
  ctx.fillStyle = PAL.soilWet; ctx.fillRect(sx+2, sy+2, 4, 2); ctx.fillRect(sx+10, sy+8, 3, 2);
  if(g<0.02){
    ctx.fillStyle = PAL.sproutGreen; ctx.fillRect(sx+7, sy+10, 2, 4);
    ctx.fillStyle = '#aed581'; ctx.fillRect(sx+8, sy+8, 1, 2);
  }else if(g<0.3){
    ctx.fillStyle = PAL.growGreen; ctx.fillRect(sx+5, sy+5, 6, 11);
    ctx.fillStyle = PAL.sproutGreen; ctx.fillRect(sx+6, sy+3, 4, 6);
  }else if(g<0.7){
    ctx.fillStyle = '#558b2f'; ctx.fillRect(sx+4, sy+3, 8, 13);
    ctx.fillStyle = '#7cb342'; ctx.fillRect(sx+5, sy+1, 6, 6);
    if(crop.type==='bubbleWheat'){ctx.fillStyle='#cddc39';ctx.beginPath();ctx.arc(sx+8,sy-1,3,0,Math.PI*2);ctx.fill();}
  }else{
    ctx.fillStyle = PAL.matureGreen; ctx.fillRect(sx+4, sy+2, 8, 14);
    if(crop.type==='moonDew'){
      ctx.fillStyle = PAL.moonDewBlue; ctx.beginPath();ctx.arc(sx+8, sy-1, 6.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#bbdefb'; ctx.beginPath();ctx.arc(sx+8, sy-1, 3, 0, Math.PI*2); ctx.fill();
      const ga = 0.18+Math.sin(S.time*0.06)*0.14;
      ctx.fillStyle = PAL.moonDewGlow;ctx.beginPath();ctx.arc(sx+8, sy-1, 11, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(sx+6, sy-3, 2, 1);
    }else if(crop.type==='bubbleWheat'){
      ctx.fillStyle = PAL.bubbleWheatGold; ctx.fillRect(sx+5, sy-2, 6, 10);
      const fg = Math.sin(S.time*0.04+crop.x*2)*4;
      ctx.fillStyle = PAL.bubbleGrain;
      ctx.beginPath();ctx.arc(sx+8, sy-8+fg, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath();ctx.arc(sx+3, sy-5+fg*0.8, 2.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath();ctx.arc(sx+13, sy-6+fg*1.1, 2.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(sx+7, sy-9+fg, 1, 0, Math.PI*2); ctx.fill();
    }else if(crop.type==='fireFungus'){
      ctx.fillStyle = PAL.fireFungusRed; ctx.beginPath();ctx.arc(sx+8, sy+1, 8, Math.PI, 0); ctx.fill();
      ctx.fillStyle = PAL.fireFungusOrange;
      ctx.beginPath();ctx.arc(sx+5, sy-2, 4.5, Math.PI, 0); ctx.fill();
      ctx.beginPath();ctx.arc(sx+11, sy-2, 4.5, Math.PI, 0); ctx.fill();
      ctx.fillStyle = 'rgba(255,120,60,0.15)';ctx.beginPath();ctx.arc(sx+8, sy, 12, 0, Math.PI*2); ctx.fill();
      if(Math.sin(S.time*0.1)>0.5){ctx.fillStyle='#ffcc80';ctx.fillRect(sx+9,sy-6,2,2);ctx.fillRect(sx+5,sy-5,1,1);}
    }
  }
}}

function render() {
  const c = document.getElementById('game');
  c.width = window.innerWidth;
  c.height = window.innerHeight;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // Camera
  const targetCX = S.player.x * TILE - c.width/2;
  const targetCY = S.player.y * TILE - c.height/2;
  S.camera.x += (targetCX - S.camera.x) * 0.1;
  S.camera.y += (targetCY - S.camera.y) * 0.1;
  const camX = S.camera.x, camY = S.camera.y;

  // Visible tile range
  const startX = Math.max(0, Math.floor(camX/TILE)-1);
  const startY = Math.max(0, Math.floor(camY/TILE)-1);
  const endX = Math.min(WORLD_W, startX + Math.ceil(c.width/TILE) + 2);
  const endY = Math.min(WORLD_H, startY + Math.ceil(c.height/TILE) + 2);

  // Draw tiles
  for (let y = startY; y < endY; y++)
    for (let x = startX; x < endX; x++)
      drawTile(ctx, x, y, S.worldData[y][x]);

  // Draw buildings
  S.buildings.forEach(b => drawBuilding(ctx, b, camX, camY));

  // Draw crops
  S.crops.forEach(c => drawCrop(ctx, c, camX, camY));

  // Draw creatures (behind player)
  S.creatures.forEach(c => drawCreature(ctx, c, camX, camY));

  // Draw NPCs
  S.npcs.forEach(n => drawNPC(ctx, n, camX, camY));

  // Draw player
  drawPlayer(ctx, camX, camY);

  // Particles
  S.particles = S.particles.filter(p => p.life > 0);
  S.particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    const hex = Math.floor(alpha*255).toString(16).padStart(2,'0');
    ctx.fillStyle = p.color + hex;
    ctx.fillRect(p.x - camX, p.y - camY, 2, 2);
    p.x += p.vx; p.y += p.vy; p.life--;
  });

  // Night overlay
  const nightAlpha = Math.max(0, Math.min(0.5, (S.time - 900) / 300 * 0.5));
  if (nightAlpha > 0.01) {
    ctx.fillStyle = `rgba(10,10,40,${nightAlpha})`;
    ctx.fillRect(0, 0, c.width, c.height);
  }

  // Territory indicator
  const hx = 15.5 * TILE - camX, hy = 17.5 * TILE - camY;
  const tColor = S.territoryLevel >= 4 ? 'rgba(255,100,255,0.25)' :
                  S.territoryLevel >= 3 ? 'rgba(100,200,255,0.25)' :
                  S.territoryLevel >= 2 ? 'rgba(100,255,150,0.2)' :
                  'rgba(255,215,0,0.2)';
  ctx.strokeStyle = tColor; ctx.lineWidth = 1 + S.territoryLevel * 0.5;
  ctx.setLineDash([6, 3]);
  ctx.beginPath(); ctx.arc(hx, hy, S.territoryRadius * TILE, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);

  // Territory label
  ctx.fillStyle = '#e8c860';
  ctx.font = '11px monospace';
  ctx.fillText(`Lv.${S.territoryLevel}`, hx - 12, hy - S.territoryRadius * TILE + 4);
}

  const hours = Math.floor(S.time / 60);

  const timeStr = `${hours}:${mins.toString().padStart(2,'0')}`;
  const timeEmoji = S.time < 720 ? '☀️' : S.time < 1080 ? '🌅' : '🌙';
  document.getElementById('info-time').textContent = `${timeEmoji} ${timeStr}`;

  const nearHome = Math.sqrt((S.player.x-15.5)**2 + (S.player.y-17.5)**2) < S.territoryRadius;
  const locName = nearHome ? '🏠 领地' : S.player.x > 50 ? '⚠️ 边缘地带' : S.player.x > 28 ? '🌲 东部荒野' : '🌿 领地周边';
  document.getElementById('info-loc').textContent = `📍 ${locName}`;
  document.getElementById('info-level').textContent = `🏠 领地 Lv.${S.territoryLevel}`;

  document.querySelectorAll('.slot').forEach((el, i) => {
    el.classList.toggle('selected', i === S.hotbarSel);
  });
  renderAllIcons();
}

// ==================== 22. SAVE / LOAD ====================
function saveGame() {
  // Clean creatures before saving (don't persist creatures)
  const saveData = {
    player: S.player, time: S.time,
    inventory: S.inventory, buildings: S.buildings,
    discoveries: S.discoveries, bestiary: S.bestiary,
    territoryLevel: S.territoryLevel, territoryRadius: S.territoryRadius,
    crops: S.crops.map(c => ({ ...c })),
    npcs: S.npcs.map(n => ({ x:n.x, y:n.y, type:n.type, name:n.name, dialogIdx:n.dialogIdx })),
    worldData: S.worldData,
    nextMemoryIdx: S.nextMemoryIdx, voidTraderTimer: S.voidTraderTimer
  };
  localStorage.setItem('isekai_pioneer_save_v2', JSON.stringify(saveData));
}

function loadGame() {
  // Try v2 save first, then v1
  let raw = localStorage.getItem('isekai_pioneer_save_v2');
  if (!raw) raw = localStorage.getItem('isekai_pioneer_save'); // legacy
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    S.player.x = data.player.x; S.player.y = data.player.y;
    S.time = data.time; S.inventory = data.inventory || S.inventory;
    // Merge legacy inventory
    if (!data.inventory?.plank) S.inventory.plank = 0;
    if (!data.inventory?.stick) S.inventory.stick = 0;
    if (!data.inventory?.ironOre) S.inventory.ironOre = 0;
    if (!data.inventory?.ironIngot) S.inventory.ironIngot = 0;
    if (!data.inventory?.crystalShard) S.inventory.crystalShard = 0;
    if (!data.inventory?.starDew) S.inventory.starDew = 0;
    if (!data.inventory?.bubbleGrain) S.inventory.bubbleGrain = 0;
    if (!data.inventory?.fireFungus) S.inventory.fireFungus = 0;

    S.buildings = data.buildings || S.buildings;
    // Ensure buildings have level field
    S.buildings.forEach(b => { if (!b.level) b.level = 1; });
    S.discoveries = data.discoveries || [];
    S.bestiary = data.bestiary || [];
    S.territoryLevel = data.territoryLevel || 1;
    S.territoryRadius = data.territoryRadius || 4;
    S.crops = data.crops || [];
    S.npcs.forEach((n, i) => { if (data.npcs && data.npcs[i]) n.dialogIdx = data.npcs[i].dialogIdx; });
    if (data.worldData) S.worldData = data.worldData;
    S.nextMemoryIdx = data.nextMemoryIdx || 0;
    S.voidTraderTimer = data.voidTraderTimer || (600 + Math.random() * 600);
    showMsg('📂 存档已加载', '#88ff88');
    updateUI();
    return true;
  } catch(e) { return false; }
}

// ==================== 23. GAME LOOP ====================
function gameLoop() {
  updatePlayer();
  updateTime();
  updateCreatures();
  updateCrops();

  // Auto-save every 30s
  S.autoSaveTimer += 0.016;
  if (S.autoSaveTimer >= 30) { saveGame(); S.autoSaveTimer = 0; }

  // Messages
  S.messages = S.messages.filter(m => m.timer > 0);
  S.messages.forEach(m => m.timer--);
  const msgEl = document.getElementById('msg');
  if (S.messages.length > 0 && S.messages[S.messages.length-1].timer > 110) {
    const m = S.messages[S.messages.length-1];
    msgEl.textContent = m.text; msgEl.style.color = m.color; msgEl.style.opacity = '1';
    setTimeout(() => { msgEl.style.opacity = '0'; }, 2000);
  }

  render();
  updateUI();
  requestAnimationFrame(gameLoop);
}

// ==================== 24. INIT ====================
S.worldData = genWorld();
if (!loadGame()) {
  showMsg('🌍 欢迎来到异世界... 你是谁？你在哪？', '#ffd700');
}
spawnCreatures();
updateUI();
updateTerritory();
gameLoop();
window.addEventListener('resize', render);
</script>
</body>
