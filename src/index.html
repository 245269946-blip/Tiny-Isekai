<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>异世界开拓者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;overflow:hidden;height:100dvh;width:100vw;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Noto Sans SC','PingFang SC',system-ui,sans-serif}
#gc{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="gc"></canvas>
<script>
// ╔══════════════════════════════════════════════════════╗
// ║  异世界开拓者 v5  —  行走·发现·建造·变化           ║
// ╚══════════════════════════════════════════════════════╝
const TS=48; // tile size in logical pixels
let W,H,SCALE=1,CX=0,CY=0,FR=0;
let held={},touchDir=null,touchStart=null;

// ─── PALETTE ───
const P={
  gr1:'#3d5a3c',gr2:'#45633e',gr3:'#3a5535',
  dt:'#6b5340',pt:'#8a7355',wd:'#8b6914',
  st:'#707070',st2:'#888',wt:'#3a7090',wt2:'#5a90b0',
  rf:'#b33a30',wl:'#c4956a',sk:'#f0c8a0',hr:'#4a2810',
  sv:'#c0c0d0',eg:'#3a8c40',fp:'#9b6fb0',fl:'#c8a0d8',
  wp:'#6b3fa0',pink:'#ff69b4',gd:'#c8a45c',
};

// ─── WORLD ───
const MW=80,MH=60;
let worldTiles=[],worldEnts=[];

function genWorld(){
  worldTiles=[];worldEnts=[];
  for(let y=0;y<MH;y++){worldTiles[y]=[];for(let x=0;x<MW;x++)worldTiles[y][x]={t:'grass',v:(x+y*3)%4};}
  // River
  for(let y=8;y<45;y++){for(let dx=-1;dx<=1;dx++){const x=38+dx;if(x>=0&&x<MW)worldTiles[y][x]={t:'water',v:0};}}
  // Bridge
  worldTiles[26][38]={t:'bridge',v:0};worldTiles[27][38]={t:'bridge',v:0};
  // Home clearing
  for(let y=20;y<=32;y++)for(let x=22;x<=33;x++){if(worldTiles[y][x].t!=='water')worldTiles[y][x]={t:'grass_home',v:0};}
  // Path home→bridge
  for(let x=33;x<=38;x++)worldTiles[26][x]={t:'path',v:0};

  // Trees
  const trees=[[15,14],[18,16],[12,18],[20,15],[10,20],[16,22],[8,24],[22,14],[25,16],[28,13],[30,18],[44,14],[47,16],[50,13],[53,18],[55,15],[58,20],[60,14],[63,17],[14,30],[18,33],[10,35],[22,28],[25,30],[45,30],[48,27],[50,32],[55,28],[58,34],[60,30]];
  trees.forEach(([x,y])=>{if(x>=0&&x<MW&&y>=0&&y<MH&&worldTiles[y][x].t==='grass')worldTiles[y][x]={t:'tree',v:0,hp:3};});

  // Rocks
  const rocks=[[17,20],[13,25],[20,28],[15,32],[26,20],[29,22],[24,28],[28,32],[45,20],[48,22],[52,25],[46,30],[56,22],[60,25],[58,30]];
  rocks.forEach(([x,y])=>{if(x>=0&&x<MW&&y>=0&&y<MH&&worldTiles[y][x].t==='grass')worldTiles[y][x]={t:'rock',v:0,hp:2};});

  // Berry bushes
  [[19,24],[23,22],[27,24],[21,30],[25,32],[49,24],[51,28],[54,22],[57,27],[59,24]].forEach(([x,y])=>{if(worldTiles[y]&&worldTiles[y][x]?.t==='grass')worldTiles[y][x]={t:'berry',v:0};});

  // ══════ ANOMALIES ══════
  // Floating rocks
  for(let y=12;y<42;y+=4){for(let x=42;x<55;x+=5){
    if((x+y)%7===0&&worldTiles[y]&&worldTiles[y][x]?.t==='grass'){
      worldEnts.push({type:'float_rock',x:x+.5,y:y+.5,phase:Math.random()*Math.PI*2,alive:true,data:{}});
    }
  }}
  // Walking trees
  [[60,12],[63,15],[61,19],[64,22],[60,27],[63,30],[62,35]].forEach(([x,y])=>{
    worldEnts.push({type:'walk_tree',x:x+.5,y:y+.5,phase:Math.random()*Math.PI*2,alive:true,dx:0,dy:0,data:{moved:0}});
  });
  // Crystal snail
  worldEnts.push({type:'crystal_snail',x:44.5,y:35,phase:0,alive:true,pathIdx:0,data:{path:[[44,35],[46,36],[48,35],[50,34],[48,33],[46,34]]}});
  // Memory jellyfish
  for(let i=0;i<3;i++)worldEnts.push({type:'memory_jelly',x:42+i*4,y:15+i*3,phase:Math.random()*Math.PI*2,alive:true,data:{}});
  // Mirror butterflies
  worldEnts.push({type:'mirror_butterfly',x:56,y:20,cx:56,cy:20,phase:0,alive:true,butterflies:Array.from({length:12},(_,i)=>({dx:(Math.random()-.5)*6,dy:(Math.random()-.5)*6,ph:Math.random()*Math.PI*2,sp:0.3+Math.random()*0.7}))});
  // Void merchant (spawns later)
  worldEnts.push({type:'void_merchant',x:58,y:28,alive:false,phase:0,spawnDay:2,data:{}});

  // Glitch edge
  for(let y=5;y<50;y+=2)for(let x=75;x<MW;x+=3)if(worldTiles[y]&&worldTiles[y][x])worldTiles[y][x]={t:'glitch',v:0};
}

// ─── PLAYER ───
let player={x:27.5,y:26.5,vx:0,vy:0,dir:0,speed:3.5};

// ─── HOME & BUILDINGS ───
let buildings=[{type:'hut',x:27,y:25}];
let builtSet=['hut'];

// ─── GAME STATE ───
let GS={
  day:1,tod:'morning', // morning|day|dusk|night
  todTimer:0,dayLen:480, // frames per time period
  res:{wood:0,stone:0,starshard:0,herb:0,crystal:0,ironOre:0},
  traits:[],disc:[],journal:[],
  flags:{firstExp:false,firstNight:false,dreamHad:false,firstChange:false,ch1:false},
  lilyAff:0,lilyTalks:0,expCompleted:[],
  playerBubble:null,bubbleTimer:0,
  npcBubbles:{},
};

// ─── BUILDING DEFS ───
const BDEFS={
  hut:{name:'小屋',icon:'🏠',cost:{},desc:'你的家',buildOn:['grass_home']},
  storage:{name:'仓库',icon:'📦',cost:{wood:3,stone:2},desc:'存放资源',buildOn:['grass_home']},
  craft:{name:'工具台',icon:'🔨',cost:{wood:5,stone:3},desc:'制作工具',buildOn:['grass_home']},
  furnace:{name:'熔炉',icon:'🔥',cost:{stone:5,ironOre:2},desc:'冶炼金属',buildOn:['grass_home']},
  garden:{name:'菜园',icon:'🌱',cost:{wood:3,herb:2},desc:'种植作物',buildOn:['grass_home'],need:'firstExp'},
  watch:{name:'观星台',icon:'🔭',cost:{wood:10,stone:6,starshard:2},desc:'解锁第一章',buildOn:['grass_home']},
};

// ─── BUBBLES ───
function playerSay(text,col='#fff'){GS.playerBubble=text;GS.bubbleTimer=120;}
function npcSay(id,text,col='#ddd'){GS.npcBubbles[id]=text;}

// ─── PARTICLES ───
let particles=[];
function spawnP(x,y,color,count=8,speed=2){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,d=Math.random()*speed;
    particles.push({x,y,vx:Math.cos(a)*d,vy:Math.sin(a)*d-1,life:25+Math.random()*20,color,size:1.5+Math.random()*2});
  }
}

// ─── FLOATING TEXT ───
let ftexts=[];
function ftext(x,y,text,color='#fff',size=14){
  ftexts.push({x,y,text,color,size,life:50,oy:y});
}

// ─── AUDIO (simple Web Audio beeps) ───
let actx=null;
function beep(freq=440,len=.08,vol=.05){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='square';o.frequency.value=freq;g.gain.value=vol;
    o.connect(g);g.connect(actx.destination);
    o.start();g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+len);
    o.stop(actx.currentTime+len);
  }catch(e){}
}

// ─── INTERACTION ───
function interact(){
  const dx=[0,1,0,-1][player.dir],dy=[-1,0,1,0][player.dir];
  const tx=Math.floor(player.x+dx*.7),ty=Math.floor(player.y+dy*.7);

  // Check entities
  for(let i=worldEnts.length-1;i>=0;i--){
    const e=worldEnts[i];
    if(!e.alive)continue;
    const dist=Math.hypot(player.x-e.x,player.y-e.y);
    if(dist<1.3){
      interactEntity(e,i);
      return;
    }
  }

  // Check tile
  if(tx>=0&&tx<MW&&ty>=0&&ty<MH){
    const tile=worldTiles[ty][tx];
    if(tile.t==='tree'&&tile.hp>0){
      tile.hp--;GS.res.wood+=1+Math.floor(Math.random()*2);
      spawnP(tx*TS+TS/2,ty*TS+TS/2,'#8B6914',6);
      ftext(tx*TS+TS/2,ty*TS,'+🪵',P.wd);
      beep(220,.06);if(tile.hp<=0){ftext(tx*TS+TS/2,ty*TS-10,'树倒了',P.wd,10);}
    }else if(tile.t==='rock'&&tile.hp>0){
      tile.hp--;GS.res.stone+=1+Math.floor(Math.random()*2);
      spawnP(tx*TS+TS/2,ty*TS+TS/2,'#888',5);
      ftext(tx*TS+TS/2,ty*TS,'+🪨',P.st);beep(300,.05);
    }else if(tile.t==='berry'){
      GS.res.herb+=2;worldTiles[ty][tx]={t:'grass',v:0};
      spawnP(tx*TS+TS/2,ty*TS+TS/2,'#ff6b6b',4);
      ftext(tx*TS+TS/2,ty*TS,'+2🌿','#ff6b6b');beep(500,.08);
    }
  }
}

function interactEntity(e,i){
  switch(e.type){
    case 'float_rock':
      if(!e.alive)break;
      e.alive=false;GS.res.starshard+=1;GS.res.stone+=1;
      spawnP(e.x*TS,e.y*TS,P.pink,12,3);
      ftext(e.x*TS,e.y*TS,'✨星之碎片','#ff69b4',16);
      if(!GS.disc.includes('浮游岩群')){GS.disc.push('浮游岩群');ftext(e.x*TS,e.y*TS-20,'新发现！','#ffd700',12);}
      beep(600,.1);
      break;
    case 'walk_tree':
      if(!e.alive)break;
      e.alive=false;GS.res.wood+=3;
      spawnP(e.x*TS,e.y*TS,'#9b59b6',10,2);
      ftext(e.x*TS,e.y*TS,'+3🪵活木！','#9b59b6',16);
      if(!GS.disc.includes('漫步树')){GS.disc.push('漫步树');ftext(e.x*TS,e.y*TS-20,'它在躲避什么...','#c8a0d8',12);}
      GS.journal.push('遇到了漫步树。它没有攻击，只是离开时留下了一截发光树枝。');
      beep(400,.15);
      break;
    case 'crystal_snail':
      if(!e.alive)break;
      e.alive=false;GS.res.crystal+=1;GS.res.herb+=1;
      spawnP(e.x*TS,e.y*TS,'#88ccff',8,2);
      ftext(e.x*TS,e.y*TS,'+1💎晶片','#88ccff',14);
      GS.journal.push('晶壳蜗牛留下了晶片。它的壳像活的棱镜。');
      beep(800,.12);
      // New snail spawns later
      setTimeout(()=>{if(worldEnts[i])worldEnts[i].alive=true;},30000);
      break;
    case 'memory_jelly':
      if(!e.alive)break;
      e.alive=false;
      spawnP(e.x*TS,e.y*TS,'#aaccff',15,3);
      ftext(e.x*TS,e.y*TS,'记忆碎片...','#aaddff',14);
      if(!GS.disc.includes('记忆水母')){GS.disc.push('记忆水母');}
      GS.journal.push('触碰了记忆水母。看到了前领主在写日记。');
      // Give a journal entry as memory
      playerSay('"抬头看天"——是谁在说？','#aaddff');
      beep(350,.2);
      break;
    case 'mirror_butterfly':
      if(!e.alive||!e.butterflies)break;
      // Catch one butterfly
      e.butterflies.pop();
      GS.res.crystal+=1;
      spawnP(e.x*TS,e.y*TS,'#ffd700',6,2);
      ftext(e.x*TS,e.y*TS,'+1💎','#ffd700',14);
      if(!GS.disc.includes('镜面蝶')){GS.disc.push('镜面蝶');ftext(e.x*TS,e.y*TS-20,'翅膀倒映着未来...','#fff',12);}
      beep(700,.1);
      if(e.butterflies.length===0)e.alive=false;
      break;
    case 'void_merchant':
      if(!e.alive)break;
      // Trade with void merchant
      if(GS.res.herb>=1){GS.res.herb-=1;GS.res.crystal+=2;
        spawnP(e.x*TS,e.y*TS,'#9b6fb0',8,2);
        ftext(e.x*TS,e.y*TS,'交易完成 +2💎','#9b6fb0',14);
      }else{playerSay('没有可以交换的东西...','#888');}
      if(!GS.disc.includes('虚空商贩')){GS.disc.push('虚空商贩');GS.journal.push('遇到了虚空商贩。它不说话——只交易。');}
      beep(250,.15);
      break;
  }
}

// ─── BUILDING ───
function tryBuildHere(bid){
  const def=BDEFS[bid];if(!def||builtSet.includes(bid))return false;
  if(def.need&&!GS.flags[def.need])return false;
  for(const[k,v]of Object.entries(def.cost)){if((GS.res[k]||0)<v)return false;}
  // Find a valid spot near player in home area
  const px=Math.round(player.x),py=Math.round(player.y);
  let bx=px,by=py;
  // check if tile is valid
  if(bx<0||bx>=MW||by<0||by>=MH)return false;
  const tile=worldTiles[by][bx];
  if(!def.buildOn.includes(tile.t))return false;
  // check no existing building
  if(buildings.some(b=>Math.abs(b.x-bx)<1.5&&Math.abs(b.y-by)<1.5))return false;

  for(const[k,v]of Object.entries(def.cost))GS.res[k]-=v;
  buildings.push({type:bid,x:bx,y:by});builtSet.push(bid);
  spawnP(bx*TS+TS/2,by*TS+TS/2,'#ffd700',15,3);
  ftext(bx*TS+TS/2,by*TS,'🏗️'+def.name,'#ffd700',16);
  beep(500,.15);setTimeout(()=>beep(700,.15),100);
  if(bid==='watch')GS.flags.ch1=true;
  if(bid==='storage')GS.flags.firstExp=true;
  return true;
}

// ─── INPUT ───
const gc=document.getElementById('gc');
gc.addEventListener('touchstart',e=>{
  e.preventDefault();touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
});
gc.addEventListener('touchmove',e=>{
  e.preventDefault();if(!touchStart)return;
  const dx=e.touches[0].clientX-touchStart.x,dy=e.touches[0].clientY-touchStart.y;
  const dist=Math.hypot(dx,dy);
  if(dist>15){touchDir={x:dx/dist,y:dy/dist};}
});
gc.addEventListener('touchend',e=>{
  e.preventDefault();
  if(touchDir&&Math.hypot(touchDir.x,touchDir.y)>0.3){
    // Swipe direction
  }else if(touchStart){
    // Tap = interact
    interact();
  }
  touchDir=null;touchStart=null;
});
gc.addEventListener('mousedown',e=>{touchStart={x:e.clientX,y:e.clientY};});
gc.addEventListener('mousemove',e=>{if(touchStart){const dx=e.clientX-touchStart.x,dy=e.clientY-touchStart.y;const d=Math.hypot(dx,dy);if(d>15)touchDir={x:dx/d,y:dy/d};}});
gc.addEventListener('mouseup',e=>{
  if(touchDir&&Math.hypot(touchDir.x,touchDir.y)>0.3){}else if(touchStart){
    const d=Math.hypot(e.clientX-touchStart.x,e.clientY-touchStart.y);
    if(d<10)interact();
  }
  touchDir=null;touchStart=null;
});
window.addEventListener('keydown',e=>{held[e.key]=true;if(e.key===' '||e.key==='e')interact();if(e.key==='b'){const b=getBuildable()[0];if(b)tryBuildHere(b);}e.preventDefault();});
window.addEventListener('keyup',e=>{held[e.key]=false;});

function getBuildable(){
  return Object.keys(BDEFS).filter(bid=>!builtSet.includes(bid)&&(!BDEFS[bid].need||GS.flags[BDEFS[bid].need])&&Object.entries(BDEFS[bid].cost).every(([k,v])=>(GS.res[k]||0)>=v));
}

// ─── UPDATE ───
function update(){
  // Movement
  let mx=0,my=0;
  if(touchDir){mx=touchDir.x;my=touchDir.y;}
  if(held['ArrowUp']||held['w']){my=-1;touchDir=null;}
  if(held['ArrowDown']||held['s']){my=1;touchDir=null;}
  if(held['ArrowLeft']||held['a']){mx=-1;touchDir=null;}
  if(held['ArrowRight']||held['d']){mx=1;touchDir=null;}

  if(mx!==0||my!==0){
    const len=Math.hypot(mx,my);mx/=len;my/=len;
    player.vx+=mx*0.4;player.vy+=my*0.4;
    if(Math.abs(mx)>Math.abs(my))player.dir=mx>0?1:3;
    else player.dir=my>0?2:0;
  }else{
    player.vx*=0.85;player.vy*=0.85;
    if(Math.abs(player.vx)<.05)player.vx=0;
    if(Math.abs(player.vy)<.05)player.vy=0;
  }
  player.vx=Math.max(-player.speed,Math.min(player.speed,player.vx));
  player.vy=Math.max(-player.speed,Math.min(player.speed,player.vy));

  // Apply movement with collision
  let nx=player.x+player.vx*0.016,ny=player.y+player.vy*0.016;
  const margin=0.25;
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    const tx=Math.floor(nx+dx*margin),ty=Math.floor(ny+dy*margin);
    if(tx<0||tx>=MW||ty<0||ty>=MH)continue;
    const tile=worldTiles[ty][tx];
    if(['water','tree'].includes(tile.t)&&(tile.t!=='tree'||tile.hp>0)){
      const cx=tx+.5,cy=ty+.5;
      if(Math.abs(nx+dx*margin-cx)<.4&&Math.abs(ny+dy*margin-cy)<.4){
        if(Math.abs(nx-cx)<Math.abs(ny-cy))ny=cy+Math.sign(ny-cy)*.4;
        else nx=cx+Math.sign(nx-cx)*.4;
      }
    }
  }
  // Building collision
  for(const b of buildings){
    const bx=b.x+.5,by=b.y+.5;
    if(Math.abs(nx-bx)<.35&&Math.abs(ny-by)<.35){
      if(Math.abs(nx-bx)<Math.abs(ny-by))ny=by+Math.sign(ny-by)*.35;
      else nx=bx+Math.sign(nx-bx)*.35;
    }
  }

  player.x=Math.max(.3,Math.min(MW-.3,nx));
  player.y=Math.max(.3,Math.min(MH-.3,ny));

  // Time
  GS.todTimer++;
  if(GS.todTimer>GS.dayLen){
    GS.todTimer=0;
    const tCycle=['morning','day','dusk','night'];
    const idx=tCycle.indexOf(GS.tod);
    GS.tod=tCycle[(idx+1)%4];
    if(GS.tod==='morning'){GS.day++;
      if(!GS.flags.dreamHad&&GS.day>=2){GS.flags.dreamHad=true;GS.flags.firstChange=true;
        GS.traits.push('蓝荧之触');GS.journal.push('做了梦。梦里有个声音。醒来时手指会发光。');
        playerSay('手指...在发光？','#aaccff');}
      if(GS.day>=2&&GS.flags.ch1&&!GS.flags.firstNight){GS.flags.firstNight=true;GS.journal.push('森林在呼唤。是时候深入探索了。');}
    }
  }

  // Update entities
  for(const e of worldEnts){
    if(!e.alive)continue;
    switch(e.type){
      case 'float_rock':break;
      case 'walk_tree':
        e.phase+=0.008;e.data.moved++;
        e.x+=Math.sin(e.phase)*0.003;e.y+=Math.cos(e.phase*0.7)*0.002;
        break;
      case 'crystal_snail':
        e.phase+=0.005;
        const path=e.data.path;if(path){
          const tgt=path[e.pathIdx];e.x+=(tgt[0]+.5-e.x)*0.008;e.y+=(tgt[1]+.5-e.y)*0.008;
          if(Math.hypot(e.x-tgt[0]-.5,e.y-tgt[1]-.5)<.3)e.pathIdx=(e.pathIdx+1)%path.length;
        }
        break;
      case 'memory_jelly':
        e.y+=Math.sin(FR*0.02+e.phase)*0.03;e.x+=Math.cos(FR*0.015+e.phase)*0.02;
        break;
      case 'mirror_butterfly':
        if(e.butterflies)e.butterflies.forEach(b=>{
          b.dx+=(Math.random()-.5)*0.2;b.dy+=(Math.random()-.5)*0.2;
          b.dx*=0.98;b.dy*=0.98;
        });
        break;
      case 'void_merchant':
        if(GS.day>=e.spawnDay&&!e.alive&&Math.random()<0.0005)e.alive=true;
        if(e.alive&&Math.random()<0.0003)e.alive=false;
        break;
    }
  }

  // Particles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});
  // Floating texts
  ftexts=ftexts.filter(t=>{t.life--;t.y-=.4;return t.life>0;});
  // Bubbles
  if(GS.bubbleTimer>0)GS.bubbleTimer--;
  if(GS.bubbleTimer<=0)GS.playerBubble=null;

  FR++;
}

// ─── RENDER ───
function render(){
  const c=document.getElementById('gc');
  const pw=window.innerWidth,ph=window.innerHeight;
  c.width=pw*2;c.height=ph*2;W=pw;H=ph;
  const ctx=c.getContext('2d');ctx.scale(2,2);
  ctx.imageSmoothingEnabled=false;

  // Camera
  const tcx=player.x*TS-W/2,tcy=player.y*TS-H/2;
  CX+=(tcx-CX)*0.15;CY+=(tcy-CY)*0.15;

  // Sky color based on time
  const skyMap={morning:'#5a7a8a',day:'#4a7aaa',dusk:'#c07050',night:'#0a0a25'};
  ctx.fillStyle=skyMap[GS.tod];ctx.fillRect(0,0,W,H);
  if(GS.tod==='night'){for(let i=0;i<60;i++){ctx.fillStyle=`rgba(255,255,200,${0.2+Math.sin(i*3+FR*0.01)*0.2})`;ctx.beginPath();ctx.arc((i*137)%W,(i*251)%H*0.5,1.2,0,Math.PI*2);ctx.fill();}}

  // Visible tile range
  const sx=Math.max(0,Math.floor(CX/TS)-1),sy=Math.max(0,Math.floor(CY/TS)-1);
  const ex=Math.min(MW,sx+Math.ceil(W/TS)+2),ey=Math.min(MH,sy+Math.ceil(H/TS)+2);

  // Draw tiles
  for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++){
    const px=x*TS-CX,py=y*TS-CY,tile=worldTiles[y][x];
    drawTile(ctx,px,py,tile);
  }

  // Draw entities
  for(const e of worldEnts){
    if(!e.alive&&e.type!=='void_merchant')continue;
    const ex=e.x*TS-CX,ey=e.y*TS-CY;
    if(ex<-TS||ex>W+TS||ey<-TS||ey>H+TS)continue;
    drawEntity(ctx,ex,ey,e);
  }

  // Draw buildings
  for(const b of buildings){
    const bx=b.x*TS-CX,by=b.y*TS-CY;
    if(bx<-TS||bx>W+TS||by<-TS||by>H+TS)continue;
    drawBuilding(ctx,bx,by,b.type);
  }

  // Draw Lily (NPC) — stands near hut
  const lilyX=26*TS-CX,lilyY=26.3*TS-CY;
  drawLily(ctx,lilyX,lilyY);

  // Draw player
  const plx=player.x*TS-CX,ply=player.y*TS-CY;
  drawPlayer(ctx,plx,ply);

  // Particles
  for(const p of particles){
    ctx.globalAlpha=p.life/40;
    ctx.fillStyle=p.color;ctx.fillRect(p.x-CX,p.y-CY,p.size,p.size);
  }
  ctx.globalAlpha=1;

  // Floating texts
  ctx.textAlign='center';
  for(const t of ftexts){
    ctx.globalAlpha=Math.min(1,t.life/20);
    ctx.fillStyle=t.color;ctx.font=`bold ${t.size}px sans-serif`;
    ctx.fillText(t.text,t.x-CX,t.y-CY);
  }
  ctx.globalAlpha=1;

  // Player bubble
  if(GS.playerBubble){
    const bx=plx+TS/2,by=ply-24;
    ctx.fillStyle='rgba(0,0,0,.7)';const tw=ctx.measureText(GS.playerBubble).width;
    const bw=tw+20,bh=26;
    ctx.beginPath();ctx.roundRect(bx-bw/2,by-bh,bw,bh,8);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText(GS.playerBubble,bx,by-bh+18);
    // Tail
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.beginPath();
    ctx.moveTo(bx-6,by);ctx.lineTo(bx+6,by);ctx.lineTo(bx,by+8);ctx.fill();
  }

  // Top HUD
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,38);
  const todEmoji={morning:'☀️',day:'☀️',dusk:'🌅',night:'🌙'};
  ctx.fillStyle='#fff';ctx.font='13px sans-serif';ctx.textAlign='left';
  let hud=`${todEmoji[GS.tod]} 第${GS.day}天  `;
  hud+=`🪵${GS.res.wood} 🪨${GS.res.stone} ✨${GS.res.starshard} 🌿${GS.res.herb} 💎${GS.res.crystal}`;
  if(GS.flags.ch1)hud='第一章·林中之声  '+hud;
  else hud='序幕·苏醒  '+hud;
  ctx.fillText(hud,10,26);

  // Bottom hint
  const bld=getBuildable();
  const nearHome=Math.hypot(player.x-27.5,player.y-26.5)<6;
  if(bld.length>0&&nearHome){
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,H-32,W,32);
    ctx.fillStyle='#ffd700';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText(`按B键 / 点击建造 可建造：${bld.map(id=>BDEFS[id].name).join(', ')}`,W/2,H-10);
  }

  // Traits display
  if(GS.traits.length>0){
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(W-130,38,130,GS.traits.length*20+8);
    ctx.fillStyle='#aaddff';ctx.font='10px sans-serif';ctx.textAlign='right';
    GS.traits.forEach((t,i)=>ctx.fillText(t,W-6,56+i*18));
  }
}

function drawTile(ctx,x,y,tile){
  switch(tile.t){
    case 'grass':ctx.fillStyle=[P.gr1,P.gr2,P.gr3,P.gr1][tile.v];ctx.fillRect(x,y,TS,TS);break;
    case 'grass_home':ctx.fillStyle='rgba(60,90,55,.6)';ctx.fillRect(x,y,TS,TS);
      ctx.strokeStyle='rgba(200,164,92,.08)';ctx.strokeRect(x+.5,y+.5,TS-1,TS-1);break;
    case 'water':ctx.fillStyle=P.wt;ctx.fillRect(x,y,TS,TS);
      const wv=Math.sin((x+tile.v+FR*0.03)*.5)*4;
      ctx.fillStyle='rgba(100,180,220,.25)';ctx.fillRect(x,y+TS/2+wv,TS,5);break;
    case 'bridge':ctx.fillStyle='#8B7355';ctx.fillRect(x,y,TS+1,TS);
      ctx.fillStyle='#6B5335';for(let i=0;i<5;i++)ctx.fillRect(x+i*12,y,4,TS);break;
    case 'path':ctx.fillStyle='#9B8B75';ctx.fillRect(x,y,TS,TS);break;
    case 'tree':ctx.fillStyle=P.gr1;ctx.fillRect(x,y,TS,TS);
      if(tile.hp>0){ctx.fillStyle='#5a4030';ctx.fillRect(x+20,y+TS-16,8,16);
        ctx.fillStyle=P.lf2;ctx.beginPath();ctx.arc(x+24,y+TS-22,16,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=P.lf;ctx.beginPath();ctx.arc(x+24,y+TS-24,12,0,Math.PI*2);ctx.fill();}
      else{ctx.fillStyle='#5a4030';ctx.fillRect(x+22,y+TS-10,4,10);}break;
    case 'rock':ctx.fillStyle=P.gr1;ctx.fillRect(x,y,TS,TS);
      if(tile.hp>0){ctx.fillStyle=P.st;ctx.beginPath();
        ctx.moveTo(x+8,y+TS-4);ctx.lineTo(x+14,y+10);ctx.lineTo(x+30,y+8);ctx.lineTo(x+TS-4,y+TS-10);ctx.lineTo(x+28,y+TS-4);ctx.closePath();ctx.fill();
        ctx.fillStyle=P.st2;ctx.beginPath();ctx.moveTo(x+16,y+16);ctx.lineTo(x+22,y+12);ctx.lineTo(x+28,y+20);ctx.fill();}break;
    case 'berry':ctx.fillStyle=P.gr1;ctx.fillRect(x,y,TS,TS);ctx.fillStyle='#3a6c2f';ctx.fillRect(x+16,y+20,12,28);
      ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(x+20,y+24,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff5555';ctx.beginPath();ctx.arc(x+28,y+20,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(x+14,y+26,5,0,Math.PI*2);ctx.fill();break;
    case 'glitch':const gx2=Math.floor(Math.random()*4);
      ctx.fillStyle=['#ff00ff','#00ffff','#ffff00','#ff0000'][gx2];ctx.fillRect(x,y,TS/2,TS/2);
      ctx.fillRect(x+TS/2,y+TS/2,TS/2,TS/2);ctx.fillStyle='#000';ctx.fillRect(x+TS/2,y,TS/2,TS/2);ctx.fillRect(x,y+TS/2,TS/2,TS/2);break;
  }
}

function drawEntity(ctx,x,y,e){
  switch(e.type){
    case 'float_rock':if(!e.alive)return;
      const fy=Math.sin(FR*0.04+e.phase)*6;
      ctx.fillStyle='rgba(0,0,0,.15)';ctx.beginPath();ctx.ellipse(x+24,y+TS-6,12,4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,105,180,.12)';ctx.beginPath();ctx.arc(x+24,y+18+fy,20,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=P.fp;ctx.beginPath();ctx.moveTo(x+12,y+28+fy);ctx.lineTo(x+6,y+10+fy);ctx.lineTo(x+24,y+6+fy);ctx.lineTo(x+TS-6,y+10+fy);ctx.lineTo(x+TS-8,y+28+fy);ctx.closePath();ctx.fill();
      ctx.fillStyle=P.fl;ctx.beginPath();ctx.moveTo(x+12,y+14+fy);ctx.lineTo(x+24,y+8+fy);ctx.lineTo(x+34,y+16+fy);ctx.fill();break;
    case 'walk_tree':if(!e.alive)return;
      const mx=Math.sin(FR*0.02+e.phase)*3;
      ctx.fillStyle='rgba(0,0,0,.15)';ctx.beginPath();ctx.ellipse(x+24+mx,y+TS-4,14,5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=P.wp;ctx.fillRect(x+20+mx,y+TS-18,10,TS-12);
      ctx.fillStyle=P.wl2;ctx.beginPath();ctx.arc(x+25+mx,y+TS-26,18,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(180,140,220,.6)';ctx.beginPath();ctx.arc(x+25+mx,y+TS-18,8,0,Math.PI*2);ctx.fill();break;
    case 'crystal_snail':if(!e.alive)return;
      ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(x+24,y+TS-4,10,3,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#aaccff';ctx.beginPath();ctx.arc(x+24,y+TS-12,16,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#cce0ff';ctx.beginPath();ctx.arc(x+22,y+TS-14,10,0,Math.PI*2);ctx.fill();
      const prism=FR*0.02;
      for(let i=0;i<3;i++){const a=prism+i*Math.PI*2/3;
        ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(FR*0.05+i)*0.2})`;ctx.beginPath();ctx.arc(x+24+Math.cos(a)*6,y+TS-12+Math.sin(a)*4,3,0,Math.PI*2);ctx.fill();}
      // Tentacles
      ctx.strokeStyle='#88aacc';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x+14,y+TS-6);
      ctx.quadraticCurveTo(x+10,y+TS,Math.cos(FR*0.03)*4+x+12,y+TS+2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+34,y+TS-6);ctx.quadraticCurveTo(x+38,y+TS,Math.cos(FR*0.03+1)*4+x+36,y+TS+2);ctx.stroke();break;
    case 'memory_jelly':if(!e.alive)return;
      ctx.fillStyle='rgba(150,200,255,.2)';ctx.beginPath();ctx.arc(x+24,y+24,20,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(200,220,255,.4)';ctx.beginPath();ctx.arc(x+24,y+28,8,0,Math.PI);ctx.fill();
      for(let i=0;i<5;i++){const a=i*Math.PI*2/5+FR*0.02;
        ctx.fillStyle='rgba(180,210,255,.5)';ctx.beginPath();
        ctx.moveTo(x+24,y+28);ctx.quadraticCurveTo(x+24+Math.cos(a)*12,y+24+Math.sin(a)*20,x+24+Math.cos(a+0.2)*14,y+36+Math.sin(a+0.2)*20);ctx.fill();}break;
    case 'mirror_butterfly':if(!e.alive)return;
      if(!e.butterflies)break;
      for(const b of e.butterflies){
        const bx2=x+b.dx*12,by2=y+b.dy*12;
        ctx.save();ctx.translate(bx2,by2);
        const flp=Math.sin(FR*0.1+b.ph)*0.5;
        ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.ellipse(-3*flp,0,5,3,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(200,220,255,.4)';ctx.beginPath();ctx.ellipse(3*flp,0,5,3,0,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
      // Glow
      ctx.fillStyle='rgba(200,220,255,.1)';ctx.beginPath();ctx.arc(x+24,y+24,24,0,Math.PI*2);ctx.fill();break;
    case 'void_merchant':if(!e.alive)return;
      ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(x+24,y+TS-4,12,4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1a1020';ctx.fillRect(x+12,y+4,24,TS-4);
      ctx.fillStyle='#2a1a30';ctx.beginPath();ctx.moveTo(x+12,y+4);ctx.lineTo(x+36,y+4);ctx.lineTo(x+36,y+12);ctx.lineTo(x+30,y+12);ctx.lineTo(x+24,y);ctx.lineTo(x+18,y+12);ctx.lineTo(x+12,y+12);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(200,180,255,.6)';ctx.fillRect(x+18,y+16,4,4);ctx.fillRect(x+26,y+16,4,4);
      // Floating items
      for(let i=0;i<3;i++){ctx.fillStyle=`rgba(200,180,255,${0.2+Math.sin(FR*0.05+i)*0.1})`;ctx.fillRect(x+10+i*12,y+TS-4+Math.sin(FR*0.04+i)*3,8,6);}break;
  }
}

function drawBuilding(ctx,x,y,type){
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(x+24,y+TS-2,14,5,0,0,Math.PI*2);ctx.fill();
  switch(type){
    case 'hut':ctx.fillStyle=P.wl;ctx.fillRect(x+6,y+14,TS-12,TS-14);
      ctx.strokeStyle='#6B5335';ctx.lineWidth=1;ctx.strokeRect(x+6,y+14,TS-12,TS-14);
      ctx.fillStyle=P.rf;ctx.beginPath();ctx.moveTo(x+2,y+14);ctx.lineTo(x+24,y-4);ctx.lineTo(x+TS-2,y+14);ctx.closePath();ctx.fill();
      ctx.fillStyle='#4a2810';ctx.fillRect(x+18,y+24,12,TS-24);
      ctx.fillStyle=GS.tod==='night'?'rgba(255,200,100,.4)':'#aaddff';ctx.fillRect(x+8,y+18,8,8);break;
    case 'storage':ctx.fillStyle='#a08060';ctx.fillRect(x+6,y+14,TS-12,TS-14);
      ctx.strokeStyle='#6B5335';ctx.strokeRect(x+6,y+14,TS-12,TS-14);
      ctx.fillStyle='#b89070';ctx.fillRect(x+4,y+10,TS-8,8);
      ctx.fillStyle='#666';ctx.fillRect(x+8,y+22,TS-16,3);ctx.fillRect(x+8,y+34,TS-16,3);break;
    case 'craft':ctx.fillStyle='#8a7a60';ctx.fillRect(x+6,y+14,TS-12,TS-14);
      ctx.fillStyle='#6a5a40';ctx.fillRect(x+6,y+12,TS-12,4);
      ctx.fillStyle='#4a3a20';ctx.fillRect(x+10,y+18,6,TS-22);ctx.fillRect(x+32,y+18,6,TS-22);break;
    case 'furnace':ctx.fillStyle='#706050';ctx.fillRect(x+6,y+10,TS-12,TS-18);
      ctx.fillStyle='#403020';ctx.fillRect(x+10,y+6,TS-20,8);
      ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(x+24,y+TS-8,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.arc(x+24,y+TS-9,3,0,Math.PI*2);ctx.fill();break;
    case 'garden':ctx.fillStyle='#4a6030';ctx.fillRect(x+4,y+20,TS-8,TS-12);
      ctx.strokeStyle='#5a4030';ctx.strokeRect(x+4,y+20,TS-8,TS-12);
      for(let r=0;r<2;r++)for(let c=0;c<2;c++){
        ctx.fillStyle='#5a4020';ctx.fillRect(x+8+c*18,y+24+r*14,12,10);
        ctx.fillStyle='#4a8a3a';ctx.fillRect(x+10+c*18,y+26+r*14,2,4);}break;
    case 'watch':ctx.fillStyle='#807060';ctx.fillRect(x+10,y+12,TS-20,TS-12);
      ctx.fillStyle='#605040';ctx.fillRect(x+10,y+8,TS-20,6);
      ctx.fillStyle='#aaddff';ctx.beginPath();ctx.arc(x+24,y+8,6,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#605040';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x+24,y+4);ctx.lineTo(x+24,y-8);ctx.stroke();break;
  }
}

function drawPlayer(ctx,x,y){
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(x+24,y+TS-2,10,3,0,0,Math.PI*2);ctx.fill();
  // Legs + shoes
  ctx.fillStyle='#5a4020';ctx.fillRect(x+10,y+TS-14,10,14);ctx.fillRect(x+28,y+TS-14,10,14);
  ctx.fillStyle='#3a2810';ctx.fillRect(x+10,y+TS-4,10,4);ctx.fillRect(x+28,y+TS-4,10,4);
  // Body
  ctx.fillStyle='#4488cc';ctx.fillRect(x+6,y+14,TS-12,TS-28);
  // Arms
  ctx.fillStyle=P.sk;ctx.fillRect(x+2,y+18,6,TS-26);ctx.fillRect(x+TS-8,y+18,6,TS-26);
  // Head
  ctx.fillStyle=P.sk;ctx.fillRect(x+10,y+2,TS-20,16);
  // Hair
  ctx.fillStyle=P.hr;ctx.fillRect(x+8,y,TS-16,8);
  // Eyes
  ctx.fillStyle='#000';ctx.fillRect(x+14,y+8,4,3);ctx.fillRect(x+30,y+8,4,3);
  // Trait: glowing fingertips
  if(GS.traits.includes('蓝荧之触')){
    ctx.fillStyle='rgba(120,170,255,.5)';ctx.fillRect(x+1,y+TS-14,5,4);ctx.fillRect(x+TS-6,y+TS-14,5,4);
  }
}

function drawLily(ctx,x,y){
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(x+24,y+TS-2,8,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a2a10';ctx.fillRect(x+12,y+TS-14,8,14);ctx.fillRect(x+28,y+TS-14,8,14);
  ctx.fillStyle=P.eg;ctx.fillRect(x+8,y+14,TS-16,TS-26);
  ctx.fillStyle=P.sk;ctx.fillRect(x+10,y+4,TS-20,14);
  ctx.fillStyle=P.sv;ctx.fillRect(x+6,y,TS-12,8);ctx.fillRect(x+4,y+4,4,8);ctx.fillRect(x+TS-8,y+4,4,8);
  ctx.fillStyle='#2a5a2a';ctx.fillRect(x+16,y+8,3,3);ctx.fillRect(x+28,y+8,3,3);
  ctx.fillStyle=P.sk;ctx.fillRect(x+3,y+6,4,8);ctx.fillRect(x+TS-7,y+6,4,8);
}

// ─── GAME LOOP ───
function loop(){
  update();render();requestAnimationFrame(loop);
}

// ─── SAVE/LOAD ───
function save(){localStorage.setItem('isekai_v5',JSON.stringify({day:GS.day,tod:GS.tod,res:GS.res,traits:GS.traits,disc:GS.disc,journal:GS.journal,flags:GS.flags,lilyAff:GS.lilyAff,lilyTalks:GS.lilyTalks,expCompleted:GS.expCompleted,builtSet,player:{x:player.x,y:player.y}}));}
function load(){const r=localStorage.getItem('isekai_v5');if(!r)return false;try{const d=JSON.parse(r);
  Object.assign(GS,{...GS,day:d.day,tod:d.tod,res:d.res,traits:d.traits,disc:d.disc,journal:d.journal,flags:d.flags,lilyAff:d.lilyAff||0,lilyTalks:d.lilyTalks||0,expCompleted:d.expCompleted||[]});
  builtSet=d.builtSet||['hut'];buildings=d.builtSet?d.builtSet.map(t=>({type:t,x:27+buildings.length,y:28})):[{type:'hut',x:27,y:25}];
  if(d.player){player.x=d.player.x;player.y=d.player.y;}
  save();return true;}catch(e){return false;}
}

// ─── BOOT ───
genWorld();
if(!load()){
  playerSay('这是...哪里？','#ffd700');
  GS.journal.push('在一个陌生的世界醒来。有一个精灵少女说这里是"边缘之地"。');
}
setInterval(save,10000);
loop();
</script></body></html>
