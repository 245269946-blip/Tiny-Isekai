<style>
:root{--bg:#1a1410;--p:#2a1f18;--g:#c8a45c;--t:#e8dcc8;--a:#5a9e6f;--r:#c44;--m:#9b6fb0;--w:#6ab0d0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;height:100dvh;touch-action:manipulation;user-select:none}
#app{display:flex;flex-direction:column;height:100dvh;max-width:900px;margin:0 auto}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:linear-gradient(180deg,#2a1f18,#1f1810);border-bottom:1px solid #3a2a1a;font-size:12px;gap:8px;flex-shrink:0;min-height:36px}
#topbar>*{white-space:nowrap}
.tb-chapter{color:var(--g);font-weight:700;font-size:13px}
.tb-mid{display:flex;gap:16px;color:#aaa;font-size:11px}
.tb-res{display:flex;gap:8px;font-size:11px}
.tb-res span{display:flex;align-items:center;gap:2px}
.tb-res .r-icon{font-size:14px}
#gameview{flex:1;position:relative;overflow:hidden;min-height:0;background:var(--bg)}
#gameview canvas{display:block;width:100%;height:100%}
#bottombar{display:flex;justify-content:space-around;padding:4px 0;background:linear-gradient(0deg,#2a1f18,#1f1810);border-top:1px solid #3a2a1a;flex-shrink:0}
#bottombar button{flex:1;padding:8px 4px;background:none;border:none;color:#777;font-size:12px;cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
#bottombar button .bicon{font-size:18px}
#bottombar button.active{color:var(--g)}
#bottombar button.active::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--g);border-radius:1px}
#bottombar button:active{background:rgba(200,164,92,.1)}
.badge{position:absolute;top:2px;right:6px;background:var(--r);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center}
#dlg-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);display:none;z-index:100;justify-content:center;align-items:flex-end;padding:0 16px 80px}
#dlg-overlay.show{display:flex}
#dlg-box{background:linear-gradient(180deg,#2a1f18,#1f1810);border:1px solid var(--g);border-radius:12px;padding:24px 20px 20px;max-width:520px;width:100%;max-height:70vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,.5)}
#dlg-box .d-portrait{width:52px;height:52px;margin:-42px auto 10px;border-radius:50%;border:2px solid var(--g);display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--p)}
#dlg-box .d-speaker{color:var(--g);font-weight:700;text-align:center;margin-bottom:6px;font-size:14px}
#dlg-box .d-text{line-height:1.8;margin-bottom:14px;font-size:14px;color:var(--t)}
#dlg-box .d-choices{display:flex;flex-direction:column;gap:7px}
#dlg-box .d-choices button{width:100%;padding:12px 14px;background:rgba(200,164,92,.06);border:1px solid rgba(200,164,92,.25);color:var(--t);border-radius:8px;font-size:13px;cursor:pointer;text-align:left;transition:.2s;line-height:1.5}
#dlg-box .d-choices button:hover{background:rgba(200,164,92,.15);border-color:var(--g)}
#dlg-box .d-choices button:disabled{opacity:.4;cursor:not-allowed}
#dlg-box .d-choices button small{display:block;color:#888;font-size:11px;margin-top:2px}
#dlg-box .d-btn{padding:10px 28px;background:var(--g);border:none;color:#1a1410;border-radius:8px;font-size:13px;cursor:pointer;font-weight:700;margin:0 auto;display:block}
#dlg-box h3{color:var(--g);margin-bottom:10px;font-size:15px}
#dlg-box .j-item,.d-item{background:rgba(200,164,92,.05);padding:8px 10px;margin-bottom:5px;border-radius:6px;font-size:12px;line-height:1.6;border-left:2px solid rgba(200,164,92,.2)}
#announce{position:fixed;top:18%;left:50%;transform:translate(-50%,-50%);color:var(--g);font-size:16px;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.8);pointer-events:none;z-index:50;opacity:0;transition:opacity .4s;white-space:nowrap}
#announce.show{opacity:1}
#hint{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);color:rgba(200,164,92,.7);font-size:11px;pointer-events:none;z-index:10;opacity:0;transition:opacity .5s}
#hint.show{opacity:1;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
#toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:60}
.toast-item{background:var(--p);border:1px solid var(--g);color:var(--g);padding:6px 16px;border-radius:16px;font-size:12px;margin-bottom:4px;animation:toastIn .3s ease-out,toastOut .3s 2s ease-in forwards;text-align:center}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
@media(max-width:600px){
 #topbar{font-size:10px;padding:4px 8px;gap:4px}.tb-chapter{font-size:11px}.tb-mid{font-size:10px;gap:8px}.tb-res{font-size:10px;gap:4px}
 #dlg-box{padding:18px 14px 16px;max-width:95%}#dlg-box .d-text{font-size:13px}#dlg-box .d-choices button{font-size:12px;padding:10px}
 #bottombar button{font-size:10px;padding:6px 2px}#bottombar button .bicon{font-size:16px}
}

const BUILDINGS={hut:{name:'小屋',icon:'🏠',cost:{},desc:'你的家。睡觉和存档的地方。'},storage:{name:'仓库',icon:'📦',cost:{wood:3,stone:2},desc:'存放远征带回的资源。'},craft:{name:'工具台',icon:'🔨',cost:{wood:5,stone:3},desc:'制作木板和工具。'},furnace:{name:'熔炉',icon:'🔥',cost:{stone:5,ironOre:3},desc:'冶炼铁矿，制作铁锭。需先发现铁矿。'},garden:{name:'奇异菜园',icon:'🌱',cost:{wood:3,herb:2},desc:'种植奇异作物。首次远征后解锁。'},watch:{name:'观星台',icon:'🔭',cost:{wood:10,stone:6,starshard:2},desc:'观测星象，发现新的远征方向。\n建成后解锁第一章。'}};

const EXPEDITIONS={
  prologue_east:{name:'东部荒野',unlock:null,nodes:[
    {t:'event',e:'float_rock',l:'?'},{t:'event',e:'talking_berry',l:'?'},{t:'event',e:'walk_tree',l:'?'},{t:'return',l:'🏠'}],
    reward:{wood:4,stone:2,starshard:1,herb:3},story:['浮游石——这个世界的基本法则不一样','有一个只对我说话的声音...它是谁？','漫步树似乎认识前领主']},
  prologue_south:{name:'南部溪谷',unlock:'firstExp',nodes:[
    {t:'event',e:'crystal_snail',l:'?'},{t:'event',e:'old_ruins',l:'?'},{t:'event',e:'memory_pool',l:'?'},{t:'return',l:'🏠'}],
    reward:{wood:2,stone:3,ironOre:2,herb:2},story:['晶壳蜗牛在传递某种信息','前任领主的笔记散落在废墟中','记忆水母——触碰后看到了不该看的东西']},
  chapter1_deep:{name:'漫步森林深处',unlock:'ch1',nodes:[
    {t:'event',e:'mirror_swarm',l:'?'},{t:'event',e:'void_merchant',l:'?'},{t:'event',e:'forest_heart',l:'?'},{t:'return',l:'🏠'}],
    reward:{wood:5,starshard:3,crystal:2},story:['镜面蝶群倒映着过去','虚空商贩——交易不需要语言','森林的中心有一个意识在呼吸']},
};

const EVENTS={
  float_rock:{title:'浮游岩群',scene:'float_rock',text:`前方草地中，十几块岩石悬浮在半人高的空中。它们缓缓起伏，表面泛着微弱的粉色光芒——像在呼吸。

你靠近时，它们微微向你倾斜。像是在...观察？`,choices:[
    {text:'冲过去采集',a:'collect',res:{starshard:2,stone:1},disc:'浮游岩群 — 会呼吸的石头，似乎能感知到人',jrnl:'发现浮游岩。这些石头不像死物——它们有某种感知力。莉莉说它们会记住触碰过的人。',txt:'你冲进去抱了三块小的。它们意外地轻。但一块大石头在你触碰后突然坠地，发出沉闷的声响。+2✨ +1🪨'},
    {text:'绕路避开',a:'bypass',res:{},txt:'你决定不碰这些石头。但走出很远回头——它们好像跟着你移动了一点？也许是错觉。'},
    {text:'停下来观察',a:'obs',res:{},disc:'浮游岩群 — 内部有发光脉络，晶体在生长又融化。会追随触碰过的人。',jrnl:'仔细观察了浮游岩。它们内部有类似血管的发光脉络。这些石头是活的——至少是某种形式的生命。',txt:'你蹲下来看了很久。脉络在脉动，晶体在不断生长又融化。你不知道这是什么——但你知道它不寻常。'}],},
  talking_berry:{title:'窃窃私语的浆果丛',scene:'berry',text:`一丛异常饱满的野莓。正要伸手——\n\n"别碰！那是我的——"\n\n你猛地转身。没人。\n\n"......开玩笑的。摘吧。"\n\n声音是从脑子里直接响起的。`,choices:[
    {text:'摘了就跑',a:'grab',res:{herb:3},txt:'你一把薅下三把野莓，拔腿就跑。"呜哇——粗鲁！"那个声音让你一整天心神不宁。+3🌿',jrnl:'浆果丛里有个声音。只有我能听到。它说我"粗鲁"。它是谁？'},
    {text:'"你是谁？"' ,a:'ask',res:{herb:1},traits:['耳语者 — 能听到某些存在的低语'],txt:'"你居然能听到我。有意思。"沉默后它说："你和他们不一样。那些不会听的人。"它不再说话了。但你获得了某种...感知。+1🌿 🌿解锁【耳语者】',jrnl:'获得了"耳语者"的能力。那个声音说我和"其他人"不一样。还有其他人来过？',disc:'神秘低语 — 一个似乎存在于世界底层的声音。提到了"那些不会听的人"。'},
    {text:'小心摘几颗',a:'gentle',res:{herb:2},txt:'你摘了几颗，留了一半。"...谢谢。很少有人这么做。往东走的话，小心那些会走的树。"+2🌿 获得关于漫步树的警告。',jrnl:'浆果丛的声音给了我一个警告——小心漫步树。"它们在躲什么东西"。'}],},
  walk_tree:{title:'移动的巨树',scene:'w_tree',text:`你确定刚才这里是空地。现在有一棵树站在这里。

树干底部粗壮的根须缓慢蠕动。整棵树在向你这边移动——然后停下。树干裂开，露出一个发光空洞——像一只巨大的眼睛。

它看着你。不是捕食者的注视。是...认出了什么？`,choices:[
    {text:'砍它！',a:'axe',dis:true,dtxt:'需要工具台制作斧头',txt:''},
    {text:'缓缓后退',a:'retreat',res:{wood:1},disc:'漫步树 — 会自由移动的巨树。有发光的"眼睛"。',txt:'你慢慢后退。它"注视"了你几秒，树冠微抖——像点头。然后继续缓慢移开，丢下一截发光的树枝。+1🪵活木',jrnl:'遇到了漫步树。它没有攻击我。它在躲避什么东西——浆果丛的话应验了。'},
    {text:'站着不动',a:'stay',res:{wood:1},txt:'你没有动。十秒后——它的树枝垂下来，轻轻碰了碰你的左肩。然后树根加速，快速离开了。你的肩膀在发光。凉凉的。+1🪵活木',jrnl:'漫步树碰了我的肩膀。树液在我皮肤上发光。这不像偶然——它似乎在确认什么。',disc:'漫步树 — 用树枝触碰了我。它的树液让皮肤发光。'}],},
  crystal_snail:{title:'折射之壳',scene:'snail',text:`一只巨大的蜗牛在溪边缓慢爬行。它的壳不是钙质的——是半透明的结晶体，像活的棱镜。

阳光穿过它的壳，在地面投射出彩虹般的光斑。它似乎没有注意到你。在它爬过的地方，青草表面凝了一层薄薄的霜。`,choices:[
    {text:'攻击它',a:'atk',res:{crystal:1,stone:1},txt:'你挥拳砸向它的壳——壳发出一声脆响，但没有碎。它缩了进去。过了很久，一只触角试探性地伸出来。它好像...不知道你在攻击它。+1💎晶片 +1🪨',disc:'晶壳蜗牛 — 壳是活的棱镜，白天蓄光晚上折射。被攻击也不反击。',jrnl:'我攻击了晶壳蜗牛。它没有反击——甚至可能没有"被攻击"的概念。我为此感到莫名惭愧。'},
    {text:'跟着它走',a:'follow',res:{herb:2},disc:'晶壳蜗牛 — 壳的折射指向隐藏的东西。它走过的路结霜。',txt:'你跟着它走了十分钟。它的壳不断折射阳光——在某一个角度，光斑聚集在灌木丛后的一个洞口。你记住了这个位置。+2🌿 发现隐藏洞穴的线索',jrnl:'晶壳蜗牛的壳像活地图——它的折射指向了隐藏的地点。这些生物在指引着什么。'},
    {text:'给它食物',a:'feed',res:{herb:1,crystal:1},txt:'你从背包里掏出野莓放在它面前。它停下来，触角碰了碰浆果。然后壳开始缓慢变色——从透明变成柔和的琥珀色。它在...感谢你？一片晶片从壳上自然脱落。+1🌿 +1💎',jrnl:'给晶壳蜗牛分享了食物。它的壳变了颜色——它能感受善意。生物之间的某些东西在这里是相通的。'}],},
  old_ruins:{title:'前任领主的笔记',scene:'ruins',text:`溪谷深处有一片石头废墟。不是自然倒塌——是被人刻意堆砌过的。石堆旁有一本皮面笔记本，封面已经发霉。

翻开第一页，字迹端正：
"第1天。我还以为在梦里。这里太美了。要记录一切。"

翻了几页——
"第30天。有些不对劲。东西在改变——不是季节的改变。是规则在改变。"

最后一页，字迹急剧潦草：
"它看着我。就在我写字的时候。它在学习。"`,choices:[
    {text:'带走笔记本',a:'take',jrnl:'找到了前任领主的日记。他记录了30天的变化。最后他确信有个东西在"学习"他。它知道他在写日记。',txt:'你把笔记本放入背包。前任领主的命运让你不寒而栗——但你需要知道更多。',res:{}},
    {text:'只读不带走',a:'read',jrnl:'读了前任领主的日记但留在了原地。也许下一个发现它的人需要看到完整的记录。',txt:'你读完了，轻轻合上。也许下一个发现它的人也需要看到这些。你用一个石头压在封面上，防止被风吹走。',res:{}},
    {text:'埋掉它',a:'bury',txt:'你用石头挖了个浅坑，把笔记本埋了。有些事不需要继续。但你在最后一页的背面看到了他自己留下的碳迹——"对不起，下一个会不同。"',jrnl:'埋掉了前领主的日记。但看到了他留给后来者的话。"对不起，下一个会不同。"',res:{},traits:['执念之触 — 前任领主的记忆偶尔会闪现在你的意识中']}],},
  memory_pool:{title:'记忆池',scene:'pool',text:`一汪寂静的水面——但水里没有倒影。

你往水里看，看到的不是自己的脸——是一个陌生男人的脸。他看起来很疲惫。嘴巴在动，但没有声音。他在对你说话。`,choices:[
    {text:'触碰水面',a:'touch',res:{},traits:['记忆印记 — 手指能感受到不属于自己的回忆'],txt:'你的手指碰到水面——画面变了。你看到那个男人在书写。他的手在发抖。他抬起头，直接看向你的方向——看向未来。然后你醒了。你不知道过了多久。',jrnl:'触碰了记忆池。看到了前任领主的最后一刻。他在对我说话——隔着时间。',disc:'记忆池 — 能映照过去的记忆而非现在的倒影。'},

// ═══════════════════ BUILDING SYSTEM ═══════════════════
function canBuild(id){const b=BUILDINGS[id];if(!b)return false;if(GS.bldgs.includes(id))return false;for(const[k,v]of Object.entries(b.cost)){if((GS.res[k]||0)<v)return false;}return true;}
function tryBuild(id){if(!canBuild(id))return false;const b=BUILDINGS[id];for(const[k,v]of Object.entries(b.cost))GS.res[k]-=v;GS.bldgs.push(id);if(id==='watch')GS.flags.ch1Unlock=true;if(id==='storage')GS.flags.builtStorage=true;announce(`🏗️ ${b.name}建成！`);save();UI();return true;}
function getBuildable(){return Object.keys(BUILDINGS).filter(id=>!GS.bldgs.includes(id)&&canBuild(id));}
function getUnlockable(){return Object.keys(BUILDINGS).filter(id=>{
  if(GS.bldgs.includes(id))return false;
  if(id==='garden'&&!GS.flags.firstExp)return false;
  if(id==='furnace'&&(GS.res.ironOre||0)<1)return false;
  if(id==='watch'&&GS.res.starshard<2)return false;
  return true;
});}

// ═══════════════════ DIALOG ═══════════════════
let _dr=null;
function dlg(speaker,portrait,text,choices){
  if(GS.blocked)return Promise.resolve(-1);
  return new Promise(r=>{_dr={r,choices};
    const b=document.getElementById('dlg-box');
    let h=`<div class="d-portrait">${portrait}</div><div class="d-speaker">${speaker}</div><div class="d-text">${text.replace(/\n/g,'<br>')}</div>`;
    if(choices&&choices.length){
      h+='<div class="d-choices">';
      choices.forEach((c,i)=>{
        if(c.dis){h+=`<button disabled>${c.text}<small>${c.dtxt||''}</small></button>`;}
        else h+=`<button onclick="GM.dlgPick(${i})">${c.text}</button>`;
      });h+='</div>';
    }else{h+='<button class="d-btn" style="display:block;margin:0 auto" onclick="GM.dlgPick(-1)">继续 ▸</button>';}
    b.innerHTML=h;document.getElementById('dlg-overlay').classList.add('show');GS.blocked=true;
  });}
function announce(t,dur=2400){
  const e=document.getElementById('announce');e.textContent=t;e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),dur);}
function toast(t){const id=Date.now();TOASTS.push({id,text:t});setTimeout(()=>TOASTS=TOASTS.filter(x=>x.id!==id),2500);UI();}
function hint(t){const e=document.getElementById('hint');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),5000);}

// ═══════════════════ RENDERER ═══════════════════
const R={
  init(){const c=document.getElementById('gc');c.width=0;this.draw();},
  draw(){
    const c=document.getElementById('gc'),p=c.parentElement;
    const pw=p.clientWidth,ph=p.clientHeight;c.width=pw*2;c.height=ph*2;
    W=c.width;H=c.height;const ctx=c.getContext('2d');ctx.scale(2,2);
    const w=W/2,h=H/2;ctx.imageSmoothingEnabled=false;
    if(GS.mode==='home')this.home(ctx,w,h);else this.expMap(ctx,w,h);
    this.particles(ctx);FR++;
  },
  home(ctx,w,h){
    // Sky
    const todColors={morning:['#5a7a8a','#7a9aaa','#9abaca'],day:['#4a7a9a','#6a9aba','#8abada'],dusk:['#c07050','#d09070','#e0a880'],night:['#0a0a25','#151535','#1a1a40']};
    const sky=todColors[GS.tod]||todColors.day;
    const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,sky[0]);g.addColorStop(.5,sky[1]);g.addColorStop(1,sky[2]);
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
    // Stars at night
    if(GS.tod==='night'){for(let i=0;i<40;i++){const sx=(i*137+FR*0.02)%w,sy=(i*251)%h*0.6;ctx.fillStyle=`rgba(255,255,200,${0.3+Math.sin(FR*0.03+i)*0.3})`;ctx.beginPath();ctx.arc(sx,sy,1.5,0,Math.PI*2);ctx.fill();}}
    // Distant horizon
    const gY=h*0.4;ctx.fillStyle=sky[2];ctx.fillRect(0,gY-20,w,h*0.25);
    // Ground
    const grd=ctx.createLinearGradient(0,gY,0,h);grd.addColorStop(0,'#4a7c50');grd.addColorStop(1,'#3a5c3a');
    ctx.fillStyle=grd;ctx.fillRect(0,gY,w,h-gY);
    // Grass texture
    for(let x=0;x<w;x+=16){for(let y=gY;y<h;y+=12){const v=((x+y*0.7)%3);ctx.fillStyle=[PAL.gr1,PAL.gr2,PAL.gr3][Math.floor(v)];ctx.fillRect(x,y,16,12);}}
    // Path
    const cp={x:w/2,y:gY+h*0.35};
    ctx.fillStyle='rgba(139,115,85,.4)';ctx.beginPath();ctx.ellipse(cp.x,cp.y,w*0.5,h*0.28,0,0,Math.PI*2);ctx.fill();

    // Grid
    const gs=Math.min(w*0.14,70);
    const slots=[{id:'hut',c:0,r:0},{id:'craft',c:1,r:0},{id:'garden',c:2,r:0},{id:'storage',c:0,r:1},{id:'furnace',c:1,r:1},{id:'watch',c:2,r:1}];
    slots.forEach(s=>{
      const gx=cp.x+(s.c-1.05)*gs*1.25,gy=cp.y+(s.r-0.55)*gs*1.3;
      ctx.fillStyle='rgba(0,0,0,.12)';ctx.fillRect(gx,gy,gs,gs);
      ctx.strokeStyle='rgba(200,164,92,.15)';ctx.lineWidth=1;
      if(!GS.bldgs.includes(s.id)&&s.id!=='hut'){ctx.setLineDash([3,3]);ctx.strokeRect(gx,gy,gs,gs);ctx.setLineDash([]);}
      else ctx.strokeRect(gx,gy,gs,gs);
    });

    // Buildings
    slots.forEach(s=>{const gx=cp.x+(s.c-1.05)*gs*1.25,gy=cp.y+(s.r-0.55)*gs*1.3;
      if(GS.bldgs.includes(s.id)||s.id==='hut')this.building(ctx,gx,gy,gs,s.id);});

    // Night glow for moon grass
    if(GS.tod==='night'&&GS.flags.firstNight){
      const gx=cp.x+1*gs*1.3+gs/2,gy=cp.y-0.55*gs*1.3+gs/2;
      ctx.fillStyle='rgba(120,160,255,.15)';ctx.beginPath();ctx.arc(gx,gy,gs*0.6,0,Math.PI*2);ctx.fill();
      for(let i=0;i<6;i++){const fx=gx-gs*0.3+i*gs*0.12,fy=gy+Math.sin(FR/40+i)*4;ctx.fillStyle='rgba(160,200,255,.7)';ctx.beginPath();ctx.arc(fx,fy,2.5,0,Math.PI*2);ctx.fill();}
    }

    // Lily NPC
    const lx=cp.x-gs*2,ly=cp.y+gs*0.1;this.lily(ctx,lx,ly,gs*0.7);
    // Player
    const px=cp.x-gs*2.4,py=cp.y+gs*0.05;this.player(ctx,px,py,gs*0.65);
  },
  building(ctx,x,y,s,id){
    const b=BUILDINGS[id];if(!b)return;
    ctx.fillStyle='#3a2f24';ctx.fillRect(x+4,y+4,s-8,s-8);
    ctx.fillStyle=PAL.gd;ctx.font=`${s*0.35}px sans-serif`;ctx.textAlign='center';
    ctx.fillText(b.icon,x+s/2,y+s/2+s*0.12);
    ctx.fillStyle='rgba(200,164,92,.6)';ctx.font=`bold ${s*0.14}px sans-serif`;
    ctx.fillText(b.name,x+s/2,y+s-6);
  },
  player(ctx,x,y,s){
    ctx.fillStyle='rgba(0,0,0,.15)';ctx.beginPath();ctx.ellipse(x+s/2,y+s-2,s*0.35,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5a4020';ctx.fillRect(x+s*0.3,y+s*0.7,s*0.16,s*0.2);ctx.fillRect(x+s*0.52,y+s*0.7,s*0.16,s*0.2);
    ctx.fillStyle='#4488cc';ctx.fillRect(x+s*0.2,y+s*0.35,s*0.6,s*0.38);
    ctx.fillStyle=PAL.sk;ctx.fillRect(x+s*0.1,y+s*0.35,s*0.12,s*0.4);ctx.fillRect(x+s*0.78,y+s*0.35,s*0.12,s*0.4);
    ctx.fillStyle=PAL.sk;ctx.fillRect(x+s*0.22,y+s*0.08,s*0.56,s*0.28);
    ctx.fillStyle=PAL.hr;ctx.fillRect(x+s*0.15,y+s*0.04,s*0.7,s*0.12);
    ctx.fillStyle='#000';ctx.fillRect(x+s*0.35,y+s*0.18,s*0.06,s*0.05);ctx.fillRect(x+s*0.55,y+s*0.18,s*0.06,s*0.05);
    ctx.fillStyle='#3a2810';ctx.fillRect(x+s*0.28,y+s*0.92,s*0.18,s*0.06);ctx.fillRect(x+s*0.5,y+s*0.92,s*0.18,s*0.06);
    // Traits visual
    if(GS.traits.some(t=>t.includes('蓝荧'))){ctx.fillStyle='rgba(120,170,255,.5)';ctx.fillRect(x+s*0.06,y+s*0.7,s*0.08,s*0.06);ctx.fillRect(x+s*0.84,y+s*0.7,s*0.08,s*0.06);}
    if(GS.traits.some(t=>t.includes('记忆印记'))||GS.traits.some(t=>t.includes('执念'))){ctx.fillStyle='rgba(200,150,255,.3)';ctx.beginPath();ctx.arc(x+s/2,y+s*0.08,s*0.5,0,Math.PI*2);ctx.fill();}
  },
  lily(ctx,x,y,s){
    ctx.fillStyle='rgba(0,0,0,.15)';ctx.beginPath();ctx.ellipse(x+s/2,y+s-2,s*0.35,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=PAL.eg;ctx.fillRect(x+s*0.22,y+s*0.35,s*0.56,s*0.55);
    ctx.fillStyle=PAL.sk;ctx.fillRect(x+s*0.25,y+s*0.1,s*0.5,s*0.28);
    ctx.fillStyle=PAL.sv;ctx.fillRect(x+s*0.15,y+s*0.02,s*0.7,s*0.16);ctx.fillRect(x+s*0.07,y+s*0.08,s*0.1,s*0.18);ctx.fillRect(x+s*0.83,y+s*0.08,s*0.1,s*0.18);
    ctx.fillStyle='#2a5a2a';ctx.fillRect(x+s*0.34,y+s*0.18,s*0.06,s*0.05);ctx.fillRect(x+s*0.56,y+s*0.18,s*0.06,s*0.05);
    ctx.fillStyle=PAL.sk;ctx.fillRect(x+s*0.06,y+s*0.1,s*0.1,s*0.16);ctx.fillRect(x+s*0.84,y+s*0.1,s*0.1,s*0.16);
    ctx.strokeStyle='#5a3a2a';ctx.lineWidth=.5;ctx.beginPath();ctx.arc(x+s*0.48,y+s*0.24,s*0.05,0,Math.PI);ctx.stroke();
    ctx.fillStyle='#4a2810';ctx.fillRect(x+s*0.24,y+s*0.93,s*0.2,s*0.06);ctx.fillRect(x+s*0.52,y+s*0.93,s*0.2,s*0.06);
  },
  expMap(ctx,w,h){
    const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#2a3a4a');g.addColorStop(.5,'#3a5040');g.addColorStop(1,'#2a4030');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
    const expId=GS.exp.dir;const exp=EXPEDITIONS[expId];if(!exp){ctx.fillStyle='#aaa';ctx.font='15px sans-serif';ctx.textAlign='center';ctx.fillText('远征',w/2,h/2-10);return;}
    ctx.fillStyle=PAL.gd;ctx.font='bold 18px sans-serif';ctx.fillText(exp.name,w/2,32);
    ctx.fillStyle='#aaa';ctx.font='12px sans-serif';ctx.fillText('点击节点前进',w/2,50);
    const nodes=exp.nodes;
    const sx=w*0.12,ex=w*0.88,ny=h*0.5;
    const sp=(ex-sx)/Math.max(nodes.length-1,1);
    // Path
    ctx.strokeStyle='rgba(200,164,92,.2)';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(sx,ny);for(let i=1;i<nodes.length;i++)ctx.lineTo(sx+sp*i,ny);ctx.stroke();
    // Walked path
    if(GS.exp.node>0){ctx.strokeStyle='rgba(200,164,92,.5)';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(sx,ny);for(let i=1;i<=Math.min(GS.exp.node,nodes.length-1);i++)ctx.lineTo(sx+sp*i,ny);ctx.stroke();}
    // Nodes
    nodes.forEach((n,i)=>{
      const nx=sx+sp*i,passed=i<GS.exp.node,curr=i===GS.exp.node;
      const r=curr?16:passed?10:8;
      ctx.fillStyle=passed?'rgba(200,164,92,.4)':curr?PAL.gd:'rgba(200,164,92,.15)';
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=curr?PAL.gd:'rgba(200,164,92,.3)';ctx.lineWidth=curr?2:1;
      ctx.beginPath();ctx.arc(nx,ny,curr?r+4:r+2,0,Math.PI*2);ctx.stroke();
      if(curr){ctx.strokeStyle='rgba(200,164,92,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(nx,ny,r+6+Math.sin(FR/12)*3,0,Math.PI*2);ctx.stroke();}
      ctx.fillStyle='#fff';ctx.font=`${curr?14:11}px sans-serif`;ctx.textAlign='center';
      ctx.fillText(n.t==='return'?'🏠':n.l,nx,ny-curr?20:16);
    });
    // Hint
    ctx.fillStyle='rgba(200,164,92,.6)';ctx.font='12px sans-serif';ctx.textAlign='center';
    if(!GS.exp.active)ctx.fillText('选择一个方向出发',w/2,h-40);
    else if(GS.exp.node>=nodes.length)ctx.fillText('点击返回...',w/2,h-40);
    else ctx.fillText('点击地图继续前进',w/2,h-40);
  },
  particles(ctx){},
};

// ═══════════════════ GAME MANAGER ═══════════════════
const GM={
  dlgPick(i){document.getElementById('dlg-overlay').classList.remove('show');GS.blocked=false;if(_dr){const r=_dr.r;_dr=null;r(i);}},
  mode(m){
    if(GS.blocked)return;
    GS.mode=m;
    document.getElementById('btn_home').classList.toggle('active',m==='home');
    document.getElementById('btn_exp').classList.toggle('active',m==='exp');
    R.draw();
    if(m==='home')hint('🏠 领地 · 选择建筑或查看信息');
    if(m==='exp'&&!GS.exp.active)hint('🗺️ 点击地图上的节点开始远征');
  },
  panel(type){
    let h='';const b=document.getElementById('dlg-box');
    if(type==='bestiary'){h='<h3>📖 奇异图鉴</h3>';
      if(!GS.disc.length)h+='<p style="color:#888">还没有发现任何奇异事物。<br>去远征吧！</p>';
      else GS.disc.forEach(d=>h+=`<div class="d-item">${d}</div>`);}
    else if(type==='journal'){h='<h3>📜 冒险日志</h3>';
      if(!GS.journal.length)h+='<p style="color:#888">还没有记录。<br>经历的事情会记录在这里。</p>';
      else GS.journal.forEach(j=>h+=`<div class="j-item">📝 ${j}</div>`);}
    else if(type==='build'){h='<h3>🏗️ 建造</h3>';
      const list=getUnlockable();const blist=getBuildable();
      if(!list.length)h+='<p style="color:#888">当前没有可建造的建筑。<br>收集更多资源或满足条件后再来。</p>';
      else{list.forEach(id=>{const b=BUILDINGS[id];const ok=blist.includes(id);
        let info=`${b.icon} ${b.name} — `;
        const costs=Object.entries(b.cost).map(([k,v])=>{const icons={wood:'🪵',stone:'🪨',starshard:'✨',herb:'🌿',ironOre:'⛏️',plank:'🪵板'};return `${icons[k]||k}${v}`;}).join(' ');
        info+=costs||'免费';
        if(b.desc.includes('\n'))info+=`<br><small style="color:#888">${b.desc.replace(/\n/g,'<br>')}</small>`;
        else info+=`<small style="color:#888"> — ${b.desc}</small>`;
        if(ok)h+=`<div class="d-choices"><button onclick="GM.build('${id}')" style="text-align:left">${info}</button></div>`;
        else h+=`<div class="d-item" style="opacity:.5">🔒 ${info}</div>`;
      });}}
    h+='<button class="d-btn" style="margin-top:12px" onclick="GM.dlgPick(-1)">关闭</button>';
    b.innerHTML=h;document.getElementById('dlg-overlay').classList.add('show');GS.blocked=true;
  },
  build(id){if(tryBuild(id)){document.getElementById('dlg-overlay').classList.remove('show');GS.blocked=false;GM.mode('home');R.draw();}},
  async startExp(dirId){
    if(GS.blocked)return;
    GS.exp={active:true,dir:dirId,node:0};
    GS.mode='exp';document.getElementById('btn_home').classList.remove('active');document.getElementById('btn_exp').classList.add('active');
    R.draw();await sleep(800);await GM.advanceExp();
  },
  async advanceExp(){
    if(GS.blocked)return;
    const exp=EXPEDITIONS[GS.exp.dir];if(!exp||GS.exp.node>=exp.nodes.length)return;
    const n=exp.nodes[GS.exp.node];if(!n)return;
    if(n.t==='return'){await GM.finishExp();return;}
    GS.exp.node++;R.draw();await sleep(600);
    if(n.t==='event'&&n.e){await GM.runEvent(n.e);}
    if(GS.exp.node>=exp.nodes.length||exp.nodes[GS.exp.node]?.t==='return'){await sleep(300);await GM.finishExp();}
  },
  async runEvent(eid){
    const ev=EVENTS[eid];if(!ev)return;
    const ci=await dlg(ev.title,'❓',ev.text,ev.choices.filter(c=>!c.dis));
    if(ci<0)return;
    const c=ev.choices.filter(x=>!x.dis)[ci];if(!c)return;
    if(c.txt)await dlg('','💬',c.txt);
    if(c.res){for(const[k,v]of Object.entries(c.res))GS.res[k]=(GS.res[k]||0)+v;}
    if(c.disc)GM.addDisc(c.disc);
    if(c.jrnl)GM.addJrnl(c.jrnl);
    if(c.traits){c.traits.forEach(t=>GM.addTrait(t));}
    GS.exp.completed=GS.exp.completed||[];GS.exp.completed.push(eid);
    save();UI();
  },
  async finishExp(){
    const exp=EXPEDITIONS[GS.exp.dir];if(!exp)return;
    if(exp.reward){for(const[k,v]of Object.entries(exp.reward))GS.res[k]=(GS.res[k]||0)+v;}
    if(exp.story)exp.story.forEach(s=>GM.addJrnl(s));
    GS.exp={active:false,dir:null,node:0,completed:GS.exp.completed||[]};
    GS.flags.firstExp=true;GS.tod='dusk';GM.mode('home');
    R.draw();announce('🏠 远征归来！');save();UI();await sleep(1500);
    if(!GS.flags.firstNight){await GM.nightfall();}
  },
  async nightfall(){
    GS.flags.firstNight=true;GS.tod='night';GM.addDisc('月露草 — 只在月光下开放。和你指尖一样的光。');
    GS.bldgs.push('garden');R.draw();UI();
    await dlg('夜幕','🌙',`天黑了下来。\n\n领地的角落亮起柔和的蓝光——一丛你从未见过的植物从泥土中钻出来。细茎顶端是半透明的花苞。\n\n莉莉站在你旁边，声音很轻："月露草。只在月光下开花。"\n\n她看了一眼你的手——指尖也在发出同样的光。\n\n"...和你的手一样的颜色。"`);
    if(!GS.flags.dreamHad)await GM.dream();
  },
  async dream(){
    GS.flags.dreamHad=true;R.draw();UI();announce('💤 沉入梦境...');await sleep(1800);
    await dlg('???','👁️',`黑暗中有韵律——像心跳，又像呼吸。\n\n意识里直接出现了文字：\n\n"第47个。欢迎来到边缘。"\n\n"你不是来寻找答案的。你是答案。"\n\n"边缘在崩塌。他们的眼睛快闭上了。在看不到你之前——"加快。"\n\n你猛地惊醒。天已经亮了。手心里写着你没写过的字：\n\n"抬头看天。"`);
    GS.flags.firstChange=true;GM.addTrait('蓝荧之触 — 指尖和月露草同步发光');
    GM.addJrnl('梦里的声音说我是第47个。"边缘在崩塌。他们的眼睛要闭上了。"我醒来时手心里写着"抬头看天"。');
    GS.day=2;GS.tod='morning';R.draw();UI();save();
    await dlg('莉莉','🧝‍♀️',`第二天早上。

莉莉看着你发光的手，沉默了很久。

"...前任领主在日记里写过类似的事。第三十天的时候，他写道：'我的影子开始不按我的动作移动了。'然后没多久他就消失了。"

她咬了咬嘴唇。

"但你不是他。你有我。"`);
  },
  addDisc(d){if(!GS.disc.includes(d)){GS.disc.push(d);toast('🔍 新发现！');}},
  addJrnl(j){if(!GS.journal.includes(j)){GS.journal.push(j);toast('📝 已记录');}},
  addTrait(t){if(!GS.traits.includes(t)){GS.traits.push(t);announce(`🌿 ${t.split('—')[0].trim()}`);}},
};

// ═══════════════════ SAVE/LOAD ═══════════════════
function save(){localStorage.setItem('isekai_v5',JSON.stringify({chapter:GS.chapter,day:GS.day,tod:GS.tod,res:GS.res,bldgs:GS.bldgs,traits:GS.traits,disc:GS.disc,journal:GS.journal,flags:GS.flags,paths:GS.paths,expCompleted:GS.exp.completed}));}
function load(){const r=localStorage.getItem('isekai_v5');if(!r)return false;try{const d=JSON.parse(r);Object.assign(GS,{...GS,chapter:d.chapter,day:d.day,tod:d.tod,res:d.res,bldgs:d.bldgs,traits:d.traits,disc:d.disc,journal:d.journal,flags:d.flags,paths:d.paths||{},exp:{active:false,dir:null,node:0,completed:d.expCompleted||[]}});return true;}catch(e){return false;}}
function UI(){
  document.getElementById('r_wood').textContent=GS.res.wood;document.getElementById('r_stone').textContent=GS.res.stone;
  document.getElementById('r_star').textContent=GS.res.starshard;document.getElementById('r_herb').textContent=GS.res.herb;
  const todMap={morning:'☀️',day:'☀️',dusk:'🌅',night:'🌙'};document.getElementById('t_tod').textContent=todMap[GS.tod]||'☀️';
  document.getElementById('t_day').textContent=`第${GS.day}天`;
  document.getElementById('t_chapter').textContent=GS.flags.ch1Unlock?'第一章·林中之声':'序幕·苏醒';
  document.getElementById('t_loc').textContent=GS.mode==='home'?(GS.flags.firstNight?'领地':'未知荒野'):'远征中';
  const toastEl=document.getElementById('toast');
  toastEl.innerHTML=TOASTS.map(t=>`<div class="toast-item">${t.text}</div>`).join('');
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ═══════════════════ INPUT ═══════════════════
document.getElementById('gc').addEventListener('click',async(e)=>{
  if(GS.blocked)return;
  if(GS.mode==='exp'&&GS.exp.active){await GM.advanceExp();}
  else if(GS.mode==='exp'&&!GS.exp.active){
    // Show expedition options
    const opts=[];
    if(true)opts.push({id:'prologue_east',name:'东部荒野',desc:'浮游岩群 · 浆果丛 · 漫步树',unlocked:true});
    if(GS.flags.firstExp)opts.push({id:'prologue_south',name:'南部溪谷',desc:'晶壳蜗牛 · 古代废墟 · 记忆池',unlocked:true});
    if(GS.flags.ch1Unlock)opts.push({id:'chapter1_deep',name:'漫步森林深处',desc:'镜面蝶群 · 虚空商贩 · 森林之心',unlocked:true});
    if(opts.length===0){announce('还没有可用的远征方向');return;}
    const ci=await dlg('选择远征方向','🗺️','去哪里？',opts.filter(o=>o.unlocked).map(o=>({text:`${o.name}`,txt:o.desc})));
    if(ci>=0){const chosen=opts.filter(o=>o.unlocked)[ci];if(chosen)await GM.startExp(chosen.id);}
  }
});

// ═══════════════════ BOOT ═══════════════════
async function boot(){
  if(load()){UI();R.draw();announce('📂 继续冒险');
    if(!GS.flags.firstExp){setTimeout(async()=>{await dlg('莉莉','🧝‍♀️','"准备好出发了吗？点击底部 [🗺️远征] 按钮！"');},800);}
  }else{
    await sleep(400);
    await dlg('???','💫',`你睁开眼睛。\n\n天空是陌生的紫色。地面触感不像泥土。你不记得自己是谁，不记得怎么来的。\n\n但你记得一件事——这里不是地球。\n\n远处有什么东西在半空中漂浮。粉色微光，像呼吸一样明灭。\n\n一个声音从背后传来：`);
    await dlg('莉莉','🧝‍♀️',`"你终于醒了！"\n\n银发精灵少女蹲在你面前，绿色眼睛里满是惊喜。\n\n"我是莉莉。在这里住了三年——你是第一个活着醒过来的。"\n\n她笑了笑，但笑意没有到眼底："上次那个醒来的人...算了不说这个。总之你现在需要一个家。"\n\n她指向远处一片空地。一间破旧但尚可使用的小屋。`);
    await dlg('莉莉','🧝‍♀️',`"那是前任领主留下的——他在日记里写满了关于这个世界的研究。但后来...他消失了。最后一页日记只有一行字——"\n\n她顿了顿。\n\n"'它知道我在看它。'"\n\n"你准备好出发了吗？点击底部 [🗺️远征] 去东边看看吧。"`);
    GM.addJrnl('我叫不出名字。莉莉说我"活着醒了"——这意味着别人来过但没醒。前领主的最后一页写着"它知道我在看它"。');
    GS.flags.tut=true;UI();R.draw();save();
  }
  // Heartbeat loop for day progress
  setInterval(()=>{R.draw();UI();save();},15000);
}
window.addEventListener('resize',()=>R.draw());
boot();
setInterval(()=>{R.draw();UI();},1000);
</script></body></html>
